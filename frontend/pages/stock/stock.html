<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock - PULMO TECHNOLOGIES</title>
<link rel="stylesheet" href="../../assets/css/style.css">
<link rel="stylesheet" href="../../assets/css/dashboard.css">
<link rel="stylesheet" href="../../assets/extracted/pages/stock/stock.inline-style-1.css">
</head>
<body>
<div class="sidebar">
    <div class="logo">
        <img src="../../assets/images/logo.png" alt="Logo">
        <span>PULMO TECHNOLOGIES</span>
    </div>
    <ul class="nav-links">
        <li><a href="../dashboard.html">Dashboard</a></li>
        <li><a href="../products/product-list.html">Products</a></li>
        <li><a href="../products/general-machine.html">Machines</a></li>
        <li><a href="../customers/customer-list.html">Customers</a></li>
        <li><a href="../invoices/invoice-list.html">Invoices</a></li>
        <li><a href="../vendors/list-vendor.html">Vendors</a></li>
        <li><a href="../expenses/expense-list.html">Expenses</a></li>
        <li><a href="../reports/sales-report.html">Reports</a></li>
        <li><a href="../analytics/sales-chart.html">Analytics</a></li>
    </ul>
</div>

<div class="main-content">
    <header class="stock-page-head">
        <h2>Stock Management</h2>
        <a class="icon-btn" href="../dashboard.html" aria-label="Back to dashboard" title="Back to dashboard">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M14.5 6.5 9 12l5.5 5.5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </a>
    </header>

    <div class="form-container">
        <div class="report-block">
            <div class="report-head">
                <h3>Stock Overview</h3>
                <div class="report-controls filters-inline">
                    <button class="icon-btn" id="clearVendorStockBtn" type="button" aria-label="Clear vender stock" title="Clear vender stock">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M3.5 14.5 12.5 5.5a2 2 0 0 1 2.8 0l3.2 3.2a2 2 0 0 1 0 2.8l-7 7H7.5l-4-4Z" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/>
                            <path d="M9.5 18.5h10.5" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
                        </svg>
                    </button>
                    <select id="stockSourceFilter" class="model-filter">
                        <option value="ALL" selected>All Sources</option>
                        <option value="PULMO">PULMO</option>
                        <option value="VENDER">Vender</option>
                        <option value="OTHER">Other</option>
                    </select>
                    <select id="stockModelFilter" class="model-filter">
                        <option value="">All Models</option>
                    </select>
                    <input type="text" id="stockSearch" class="search-inline" placeholder="Search Product ID, Description, Category, Model">
                </div>
            </div>
            <div class="table-scroll-wrap">
                <table id="stockTable">
                    <thead>
                        <tr>
                            <th>Product ID</th>
                            <th>Description</th>
                            <th>Model</th>
                            <th>Category</th>
                            <th>Current Stock</th>
                            <th>Manage Stock</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="../../assets/js/api.js"></script>
<script src="../../assets/extracted/pages/stock/stock.inline-script-1.js"></script>
</body>
</html>
