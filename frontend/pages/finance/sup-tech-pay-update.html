<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sup.Tech Pay Update - PULMO TECHNOLOGIES</title>
<link rel="stylesheet" href="../../assets/css/style.css">
<link rel="stylesheet" href="../../assets/css/dashboard.css">
<link rel="stylesheet" href="../../assets/css/sup-tech-pay-update.css">
</head>
<body>

<div class="sidebar">
    <div class="logo">
        <img src="../../assets/images/logo.png" alt="Logo">
        <span>PULMO TECHNOLOGIES</span>
    </div>
    <ul class="nav-links">
        <li><a href="../dashboard.html">Dashboard</a></li>
        <li><a href="../products/product-list.html">Products</a></li>
        <li><a href="../products/general-machine.html">Machines</a></li>
        <li><a href="../customers/customer-list.html">Customers</a></li>
        <li><a href="../invoices/invoice-list.html">Invoices</a></li>
        <li><a href="../vendors/list-vendor.html">Vendors</a></li>
        <li><a href="../expenses/expense-list.html">Expenses</a></li>
        <li><a href="../reports/sales-report.html">Reports</a></li>
        <li><a href="../analytics/sales-chart.html">Analytics</a></li>
        <li><a href="finance.html">Finance</a></li>
    </ul>
</div>

<div class="main-content">
    <header class="page-head">
        <h2>Sup.Tech Pay Update</h2>
        <a class="icon-btn" href="sup-tech-pay.html" aria-label="Back to Sup.Tech Pay" title="Back to Sup.Tech Pay">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M14.5 6.5 9 12l5.5 5.5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </a>
    </header>

    <div class="form-container">
        <div class="invoice-meta-panel">
            <div class="field">
                <label for="invoiceTitle">Invoice Title</label>
                <input type="text" id="invoiceTitle" readonly>
            </div>

            <div class="invoice-meta-grid">
                <div class="field">
                    <label for="invoiceDate">Invoice Date</label>
                    <input type="text" id="invoiceDate" readonly>
                </div>
                <div class="field">
                    <label for="invoiceAmount">Invoice Amount</label>
                    <input type="text" id="invoiceAmount" readonly>
                </div>
                <div class="field">
                    <label for="customerName">Customer</label>
                    <input type="text" id="customerName" readonly>
                </div>
                <div class="field">
                    <label for="supportTechnician">Support Technician</label>
                    <input type="text" id="supportTechnician" readonly>
                </div>
                <div class="field">
                    <label for="supportTechnicianPercentage">Support Technician Percentage</label>
                    <input type="text" id="supportTechnicianPercentage" readonly>
                </div>
            </div>

        </div>

        <form id="supTechPayForm">
            <div class="toolbar form-toolbar">
                <div class="field">
                    <label for="vendorPayAmount">Vendor Pay Amount</label>
                    <input type="number" id="vendorPayAmount" min="0" step="0.01" required>
                </div>
                <div class="field">
                    <label for="supportTechPayAmount">Support Tech Pay Amount</label>
                    <input type="number" id="supportTechPayAmount" min="0" step="0.01" required>
                </div>
                <div class="field">
                    <label for="paymentMethod">Payment Method</label>
                    <select id="paymentMethod" required>
                        <option value="Cash">Cash</option>
                        <option value="Online">Online</option>
                        <option value="Cheque">Cheque</option>
                    </select>
                </div>
            </div>

            <div class="toolbar proof-toolbar">
                <input type="file" id="paymentProofFile" accept="image/*" capture="environment" hidden>
                <button type="button" class="icon-btn camera-btn" id="captureProofBtn" aria-label="Capture payment proof" title="Capture payment proof">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M4.5 8.5h3l1.2-2h6.6l1.2 2h3a1.5 1.5 0 0 1 1.5 1.5v7A1.5 1.5 0 0 1 19.5 18.5h-15A1.5 1.5 0 0 1 3 17V10A1.5 1.5 0 0 1 4.5 8.5Z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
                        <circle cx="12" cy="13.2" r="3.3" fill="none" stroke="currentColor" stroke-width="1.6"/>
                    </svg>
                </button>
                <span id="paymentProofName" class="file-name">No image selected</span>
            </div>

            <div class="proof-preview">
                <img id="paymentProofPreview" alt="Payment proof preview" hidden>
            </div>

            <div class="save-row">
                <button type="submit" class="icon-btn" aria-label="Save Sup.Tech Pay" title="Save Sup.Tech Pay">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M5.5 3.5h11l2 2V20.5H5.5Z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
                        <path d="M8 3.5v5h7v-5" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
                        <path d="M8 14h8" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
                    </svg>
                </button>
            </div>
        </form>

        <div class="items-section">
            <h3>Invoice Items</h3>
            <table id="supTechPayItemsTable">
                <thead>
                    <tr>
                        <th>Item</th>
                        <th>Qty</th>
                        <th>Sell Rate</th>
                        <th>Vendor Rate</th>
                        <th>Line Sell Total</th>
                        <th>Line Vendor Total</th>
                    </tr>
                </thead>
                <tbody id="supTechPayItemsBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script src="../../assets/js/api.js"></script>
<script src="../../assets/js/sup-tech-pay-update.js"></script>
</body>
</html>
