<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warrenty - PULMO TECHNOLOGIES</title>
<link rel="stylesheet" href="../../assets/css/style.css">
<link rel="stylesheet" href="../../assets/css/dashboard.css">
</head>
<body>
<div class="sidebar">
    <div class="logo">
        <img src="../../assets/images/logo.png" alt="Company Logo">
        <span>PULMO TECHNOLOGIES</span>
    </div>
    <ul class="nav-links">
        <li><a href="../dashboard.html">Dashboard</a></li>
        <li><a href="../products/product-list.html">Products</a></li>
        <li><a href="../products/general-machine.html">Machines</a></li>
        <li><a href="../customers/customer-list.html">Customers</a></li>
        <li><a href="../invoices/invoice-list.html">Invoices</a></li>
        <li><a href="../vendors/list-vendor.html">Vendors</a></li>
        <li><a href="../expenses/expense-list.html">Expenses</a></li>
        <li><a href="../reports/sales-report.html">Reports</a></li>
        <li><a href="../analytics/sales-chart.html">Analytics</a></li>
    </ul>
</div>

<div class="main-content">
    <header><h2>Warrenty</h2></header>
    <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;">
            <h3 style="margin:0;">Invoices (Invoice Date Order)</h3>
            <a class="btn btn-secondary" href="support.html">Back</a>
        </div>
        <table class="table" style="margin-top:12px;">
            <thead>
                <tr>
                    <th>Warranty</th>
                    <th>Invoice Date</th>
                    <th>Warranty End</th>
                    <th>Invoice No</th>
                    <th>Customer</th>
                    <th>Total</th>
                    <th>Payment Status</th>
                </tr>
            </thead>
            <tbody id="warrentyInvoiceBody"></tbody>
        </table>
    </div>
</div>

<script src="../../assets/js/api.js"></script>
<script>
function getRole(){
    return (localStorage.getItem("role") || "").toLowerCase();
}

function canViewWarrentyPage(){
    const role = getRole();
    const hasPermission = () => {
        if(typeof hasUserGrantedPath === "function" && hasUserGrantedPath("/support/warrenty.html")){
            return true;
        }
        if(typeof hasUserActionPermission === "function"){
            return hasUserActionPermission("/support/warrenty.html", "view")
                || hasUserActionPermission("/support/support.html", "view")
                || hasUserActionPermission("/support/support.html", "add")
                || hasUserActionPermission("/support/support.html", "edit")
                || hasUserActionPermission("/support/support.html", "delete");
        }
        return false;
    };

    if(role === "admin" || role === "manager"){
        if(typeof hasAccessConfigRestrictions === "function" && hasAccessConfigRestrictions()){
            return hasPermission();
        }
        return true;
    }
    return hasPermission();
}

function fmtDate(value){
    if(!value) return "";
    const d = new Date(value);
    if(Number.isNaN(d.getTime())) return String(value);
    return d.toLocaleDateString("en-GB");
}

function fmtMoney(value){
    const n = Number(value || 0);
    return n.toFixed(2);
}

async function loadWarrentyInvoices(){
    try{
        const rows = await request("/invoices/warranty-invoices","GET");
        const list = Array.isArray(rows) ? rows : [];

        const tbody = document.getElementById("warrentyInvoiceBody");
        tbody.innerHTML = "";

        list.forEach((inv) => {
            const tr = document.createElement("tr");
            tr.innerHTML = `
                <td>${inv.warranty_period || ""}</td>
                <td>${fmtDate(inv.invoice_date)}</td>
                <td>${fmtDate(inv.warranty_expiry_date)}</td>
                <td>${inv.invoice_no || ""}</td>
                <td>${inv.customer_name || ""}</td>
                <td>${fmtMoney(inv.total)}</td>
                <td>${inv.payment_status || ""}</td>
            `;
            tbody.appendChild(tr);
        });

        if(!list.length){
            const tr = document.createElement("tr");
            tr.innerHTML = `<td colspan="7" style="text-align:center;">No active warranty invoices found.</td>`;
            tbody.appendChild(tr);
        }
    }catch(err){
        alert(err.message || "Failed to load invoices.");
    }
}

window.addEventListener("DOMContentLoaded", async () => {
    if(typeof window.__waitForUserAccessPermissions === "function"){
        await window.__waitForUserAccessPermissions();
    }
    if(!canViewWarrentyPage()){
        alert("You don't have access to Warrenty.");
        window.location.href = "../dashboard.html";
        return;
    }
    loadWarrentyInvoices();
});
</script>
</body>
</html>
