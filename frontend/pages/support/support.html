<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Support - PULMO TECHNOLOGIES</title>
<link rel="stylesheet" href="../../assets/css/style.css">
<link rel="stylesheet" href="../../assets/css/dashboard.css">
<link rel="stylesheet" href="../../assets/extracted/pages/support/support.inline-style-1.css">
</head>
<body>
<div class="sidebar">
    <div class="logo">
        <img src="../../assets/images/logo.png" alt="Company Logo">
        <span>PULMO TECHNOLOGIES</span>
    </div>
    <ul class="nav-links">
        <li><a href="../dashboard.html">Dashboard</a></li>
        <li><a href="../products/product-list.html">Products</a></li>
        <li><a href="../products/general-machine.html">Machines</a></li>
        <li><a href="../customers/customer-list.html">Customers</a></li>
        <li><a href="../invoices/invoice-list.html">Invoices</a></li>
        <li><a href="../vendors/list-vendor.html">Vendors</a></li>
        <li><a href="../expenses/expense-list.html">Expenses</a></li>
        <li><a href="../reports/sales-report.html">Reports</a></li>
        <li><a href="../analytics/sales-chart.html">Analytics</a></li>
    </ul>
</div>

<div class="main-content">
    <header><h2>Support</h2></header>

    <div class="card" style="margin-bottom:12px;">
        <div class="support-link-row">
            <a id="addTechnicianBtn" class="btn btn-primary" href="../users/technician-list.html">Support Technician</a>
            <a id="warrentyBtn" class="btn btn-secondary" href="warrenty.html" style="display:none;">Warrenty</a>
        </div>
    </div>

    <div class="card">
        <h3>Add Important</h3>
        <form id="supportImportantForm">
            <label for="importantText">Important</label>
            <input id="importantText" type="text" required placeholder="Enter important note">
            <label for="warrantyPeriod">Warranty Period</label>
            <select id="warrantyPeriod" required>
                <option value="3 month">3 month</option>
                <option value="6 month">6 month</option>
                <option value="1 year">1 year</option>
                <option value="2 year">2 year</option>
            </select>

            <div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:10px;">
                <button class="btn btn-primary" type="submit">Add Important</button>
                <a class="btn btn-secondary" href="../dashboard.html">Back</a>
            </div>
        </form>
    </div>

    <div class="card" style="margin-top:12px;">
        <h3>Important Library</h3>
        <table class="table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Important</th>
                    <th>Warranty</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="support-important-body"></tbody>
        </table>
    </div>
</div>

<script src="../../assets/js/api.js"></script>
<script src="../../assets/extracted/pages/support/support.inline-script-1.js"></script>
</body>
</html>
