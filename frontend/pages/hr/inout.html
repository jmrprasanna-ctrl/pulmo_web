<div class="main-content">
    <header class="page-head">
        <h2>INOUT</h2>
        <a class="icon-btn" href="../dashboard.html" aria-label="Back to dashboard" title="Back to dashboard">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M14.5 6.5 9 12l5.5 5.5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </a>
    </header>

    <div class="form-container">
        <div class="toolbar">
            <div class="field">
                <label>User</label>
                <input type="text" id="inoutUserName" readonly>
            </div>
            <div class="field">
                <label>Status</label>
                <input type="text" id="inoutStatus" readonly>
            </div>
            <div class="field">
                <label>Last In</label>
                <input type="text" id="lastCheckInAt" readonly>
            </div>
            <div class="field">
                <label>Last Out</label>
                <input type="text" id="lastCheckOutAt" readonly>
            </div>
        </div>

        <div class="toolbar">
            <button type="button" class="icon-btn" id="checkInBtn" aria-label="Check In" title="Check In">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="m4 12 6 6 10-12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
            <button type="button" class="icon-btn btn-danger" id="checkOutBtn" aria-label="Time Out" title="Time Out">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M6 6l12 12M18 6 6 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </button>
        </div>
        <div class="path-hint" id="gpsHint">Location: Waiting for action...</div>
