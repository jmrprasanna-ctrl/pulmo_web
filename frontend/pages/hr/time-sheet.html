<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Time Sheet - PULMO TECHNOLOGIES</title>
<link rel="stylesheet" href="../../assets/css/style.css">
<link rel="stylesheet" href="../../assets/css/dashboard.css">
<style>
    .page-head{
        display:flex;
        align-items:center;
        justify-content:space-between;
        gap:12px;
        margin-bottom:16px;
    }
    .page-head h2{
        margin:0;
    }
    .timesheet-table-wrap{
        width:100%;
        overflow:auto;
        max-height:calc(100vh - 330px);
        border:1px solid var(--line);
        border-radius:var(--radius-md);
        background:#fff;
    }
    .timesheet-table-wrap table{
        margin:0;
        border:0;
        border-radius:0;
        min-width:1060px;
    }
    .timesheet-table-wrap thead th{
        position:sticky;
        top:0;
        z-index:1;
    }
</style>
</head>
<body>
<div class="sidebar">
    <div class="logo">
        <img src="../../assets/images/logo.png" alt="Company Logo">
        <span>PULMO TECHNOLOGIES</span>
    </div>
    <ul class="nav-links">
        <li><a href="../dashboard.html">Dashboard</a></li>
        <li><a href="../products/product-list.html">Products</a></li>
        <li><a href="../products/general-machine.html">Machines</a></li>
        <li><a href="../customers/customer-list.html">Customers</a></li>
        <li><a href="../invoices/invoice-list.html">Invoices</a></li>
        <li><a href="../vendors/list-vendor.html">Vendors</a></li>
        <li><a href="../expenses/expense-list.html">Expenses</a></li>
        <li><a href="../reports/sales-report.html">Reports</a></li>
        <li><a href="../analytics/sales-chart.html">Analytics</a></li>
        <li><a href="../finance/finance.html">Finance</a></li>
        <li><a href="../support/support.html">Support</a></li>
        <li><a href="../stock/stock.html">Stock</a></li>
        <li><a href="inout.html">INOUT</a></li>
        <li><a href="time-sheet.html">Time Sheet</a></li>
    </ul>
</div>

<div class="main-content">
    <header class="page-head">
        <h2>Time Sheet</h2>
        <a class="icon-btn" href="../dashboard.html" aria-label="Back to dashboard" title="Back to dashboard">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M14.5 6.5 9 12l5.5 5.5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </a>
    </header>

    <div class="form-container">
        <div class="toolbar">
            <div class="field">
                <label for="tsMonth">Month</label>
                <input type="month" id="tsMonth">
            </div>
            <div class="field">
                <label for="tsUserFilter">User</label>
                <select id="tsUserFilter">
                    <option value="">All Users</option>
                </select>
            </div>
            <button type="button" class="icon-btn" id="tsSavePdfBtn" aria-label="Save PDF" title="Save PDF">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M7 3.5h7.5L19.5 8v11a1.5 1.5 0 0 1-1.5 1.5h-11A1.5 1.5 0 0 1 5.5 19v-14A1.5 1.5 0 0 1 7 3.5Z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
                    <path d="M14.5 3.5V8H19" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
                    <path d="M8.5 12.5h7M8.5 16h7" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                </svg>
            </button>
        </div>

        <div class="timesheet-table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>User</th>
                        <th>Role</th>
                        <th>Check In</th>
                        <th>In Location</th>
                        <th>Check Out</th>
                        <th>Out Location</th>
                        <th>Hours</th>
                        <th>O.T</th>
                    </tr>
                </thead>
                <tbody id="tsBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script src="../../assets/js/api.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="../../assets/js/hr-timesheet.js"></script>
</body>
</html>
