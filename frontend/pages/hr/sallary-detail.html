<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sallary Detail - PULMO TECHNOLOGIES</title>
<link rel="stylesheet" href="../../assets/css/style.css">
<link rel="stylesheet" href="../../assets/css/dashboard.css">
<style>
    .page-head{
        display:flex;
        align-items:center;
        justify-content:space-between;
        gap:12px;
        margin-bottom:16px;
    }
    .page-head h2{
        margin:0;
    }
    .detail-grid{
        display:grid;
        grid-template-columns:repeat(2,minmax(260px,1fr));
        gap:12px;
    }
    .detail-grid .field label{
        margin-top:0;
    }
    .allowances-head{
        display:flex;
        align-items:center;
        justify-content:space-between;
        gap:10px;
        margin-top:12px;
        margin-bottom:8px;
    }
    .allowances-head label{
        margin:0;
    }
    .allowance-icon-btn{
        width:42px;
        height:42px;
        min-height:42px;
        margin-top:0;
        padding:0;
        border:1px solid #cfe1f5;
        border-radius:12px;
        background:#fff;
        color:#0b4f93;
        display:inline-grid;
        place-items:center;
        cursor:pointer;
        transition:transform 0.15s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }
    .allowance-icon-btn svg{
        width:18px;
        height:18px;
    }
    .allowance-icon-btn:hover:not(:disabled){
        transform:translateY(-1px);
        box-shadow:0 10px 20px rgba(15, 106, 191, 0.14);
        border-color:#adc9e6;
    }
    .allowance-icon-btn:disabled{
        opacity:0.55;
        cursor:not-allowed;
        transform:none;
        box-shadow:none;
    }
    .allowances-list{
        display:grid;
        gap:8px;
    }
    .allowance-row{
        display:grid;
        grid-template-columns:minmax(180px,1fr) minmax(120px,200px) auto;
        gap:8px;
        align-items:center;
    }
    .allowance-row input{
        margin:0;
    }
    .allowance-remove{
        border-color:#f0c2ca;
        background:#fff2f4;
        color:#b4232f;
    }
    .allowance-remove:hover:not(:disabled){
        box-shadow:0 10px 20px rgba(176, 35, 47, 0.16);
        border-color:#e3a8b2;
    }
    .update-wrap{
        display:flex;
        align-items:center;
        justify-content:flex-start;
        gap:10px;
        margin-top:14px;
    }
    .update-icon-btn{
        width:42px;
        height:42px;
        min-height:42px;
        margin-top:0;
        padding:0;
        border:1px solid #cfe1f5;
        border-radius:12px;
        background:#fff;
        color:#0b4f93;
        display:inline-grid;
        place-items:center;
        cursor:pointer;
        transition:transform 0.15s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }
    .update-icon-btn svg{
        width:18px;
        height:18px;
    }
    .update-icon-btn:hover:not(:disabled){
        transform:translateY(-1px);
        box-shadow:0 10px 20px rgba(15, 106, 191, 0.14);
        border-color:#adc9e6;
    }
    .update-icon-btn:disabled{
        opacity:0.55;
        cursor:not-allowed;
        transform:none;
        box-shadow:none;
    }
    .update-wrap .path-hint{
        margin:0;
    }
    .inline-icon{
        width:18px;
        height:18px;
    }
    @media (max-width: 900px){
        .detail-grid{
            grid-template-columns:1fr;
        }
        .allowance-row{
            grid-template-columns:1fr;
        }
        .allowance-remove{
            justify-self:flex-start;
        }
    }
</style>
</head>
<body>
<div class="sidebar">
    <div class="logo">
        <img src="../../assets/images/logo.png" alt="Company Logo">
        <span>PULMO TECHNOLOGIES</span>
    </div>
    <ul class="nav-links">
        <li><a href="../dashboard.html">Dashboard</a></li>
        <li><a href="../products/product-list.html">Products</a></li>
        <li><a href="../products/general-machine.html">Machines</a></li>
        <li><a href="../customers/customer-list.html">Customers</a></li>
        <li><a href="../invoices/invoice-list.html">Invoices</a></li>
        <li><a href="../vendors/list-vendor.html">Vendors</a></li>
        <li><a href="../expenses/expense-list.html">Expenses</a></li>
        <li><a href="../reports/sales-report.html">Reports</a></li>
        <li><a href="../analytics/sales-chart.html">Analytics</a></li>
        <li><a href="../finance/finance.html">Finance</a></li>
        <li><a href="../support/support.html">Support</a></li>
        <li><a href="../stock/stock.html">Stock</a></li>
        <li><a href="inout.html">INOUT</a></li>
        <li><a href="time-sheet.html">Time Sheet</a></li>
        <li><a href="sallary.html">Sallary</a></li>
    </ul>
</div>

<div class="main-content">
    <header class="page-head">
        <h2>Sallary Detail</h2>
        <a class="icon-btn" href="sallary.html" aria-label="Back to sallary list" title="Back to sallary list">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M14.5 6.5 9 12l5.5 5.5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </a>
    </header>

    <div class="form-container">
        <div class="detail-grid">
            <div class="field">
                <label>Profile Name</label>
                <input type="text" id="sdProfileName" readonly>
            </div>
            <div class="field">
                <label>Login User</label>
                <input type="text" id="sdLoginUser" readonly>
            </div>
            <div class="field">
                <label>Role</label>
                <input type="text" id="sdRole" readonly>
            </div>
            <div class="field">
                <label>Department</label>
                <input type="text" id="sdDepartment" readonly>
            </div>
            <div class="field">
                <label>Email</label>
                <input type="text" id="sdEmail" readonly>
            </div>
            <div class="field">
                <label>Mobile</label>
                <input type="text" id="sdMobile" readonly>
            </div>
            <div class="field" style="grid-column:1/-1;">
                <label>Address</label>
                <textarea id="sdAddress" readonly></textarea>
            </div>
            <div class="field">
                <label for="sdBankName">Bank</label>
                <select id="sdBankName">
                    <option value="">Select Bank</option>
                    <option value="Commercial Bank">Commercial Bank</option>
                    <option value="Peoples Bank">Peoples Bank</option>
                    <option value="Bank of Ceylon">Bank of Ceylon</option>
                    <option value="Sampath Bank">Sampath Bank</option>
                    <option value="Seylan Bank">Seylan Bank</option>
                    <option value="Nation Trust Bank">Nation Trust Bank</option>
                    <option value="NDB">NDB</option>
                    <option value="HNB">HNB</option>
                    <option value="NSB">NSB</option>
                    <option value="OTHER">OTHER</option>
                </select>
            </div>
            <div class="field" id="sdOtherBankWrap" style="display:none;">
                <label for="sdOtherBankName">Other Bank Name</label>
                <input type="text" id="sdOtherBankName" placeholder="Enter bank name">
            </div>
            <div class="field">
                <label for="sdBankAccount">Bank Account</label>
                <input type="text" id="sdBankAccount" placeholder="Enter bank account number">
            </div>
            <div class="field">
                <label for="sdBasicSallary">Basic Sallary Entry</label>
                <input type="number" id="sdBasicSallary" min="0" step="0.01" placeholder="0.00">
            </div>
            <div class="field">
                <label for="sdSalaryStartDate">Salary Start Date</label>
                <input type="date" id="sdSalaryStartDate" readonly>
            </div>
            <div class="field">
                <label for="sdSalaryEndDate">Salary End Date</label>
                <input type="date" id="sdSalaryEndDate" readonly>
            </div>
            <div class="field">
                <label for="sdWorkingDays">Working Days</label>
                <input type="number" id="sdWorkingDays" min="0" step="0.01" placeholder="0.00">
            </div>
            <div class="field">
                <label for="sdCalculatedWorkingHours">IN / OUT Working Hrs (Calculated)</label>
                <input type="text" id="sdCalculatedWorkingHours" readonly>
            </div>
            <div class="field">
                <label for="sdCalculatedOtHours">OT Hrs (Calculated)</label>
                <input type="text" id="sdCalculatedOtHours" readonly>
            </div>
            <div class="field">
                <label for="sdOtPayAmount">OT Pay Amount Hrs</label>
                <input type="number" id="sdOtPayAmount" min="0" step="0.01" placeholder="0.00">
            </div>
            <div class="field" style="grid-column:1/-1;">
                <div class="allowances-head">
                    <label>Add Alloances</label>
                    <button type="button" class="allowance-icon-btn" id="sdAddAllowanceBtn" aria-label="Add allowance" title="Add allowance">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M12 5v14M5 12h14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                    </button>
                </div>
                <div id="sdAllowancesList" class="allowances-list"></div>
            </div>
            <div class="field" style="grid-column:1/-1;">
                <div class="allowances-head">
                    <label>Add Deductions</label>
                    <button type="button" class="allowance-icon-btn" id="sdAddDeductionBtn" aria-label="Add deduction" title="Add deduction">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M12 5v14M5 12h14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                    </button>
                </div>
                <div id="sdDeductionsList" class="allowances-list"></div>
            </div>
        </div>

        <div class="update-wrap">
            <button type="button" id="sdUpdateBtn" class="update-icon-btn" aria-label="Save sallary detail" title="Save sallary detail">
                <svg class="inline-icon" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M6 4.5h10l2.5 2.5V19a1.5 1.5 0 0 1-1.5 1.5h-10A1.5 1.5 0 0 1 5.5 19V6A1.5 1.5 0 0 1 7 4.5Z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
                    <path d="M8.5 4.5h6v4h-6z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
                    <path d="M8.5 14.5h7" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                </svg>
            </button>
            <div class="path-hint" id="sdStatusHint"></div>
        </div>
    </div>
</div>

<script src="../../assets/js/api.js"></script>
<script src="../../assets/js/hr-sallary-detail.js"></script>
</body>
</html>
