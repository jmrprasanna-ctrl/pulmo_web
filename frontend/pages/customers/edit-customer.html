<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Customer - PULMO TECHNOLOGIES</title>
<link rel="stylesheet" href="../../assets/css/style.css">
<link rel="stylesheet" href="../../assets/css/dashboard.css">
<style>
    .uppercase-input{
        text-transform: uppercase;
    }

    .form-actions{
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-top: 12px;
        align-items: center;
    }

    .form-actions button,
    .form-actions .btn{
        margin-top: 0;
    }

    .btn-secondary{
        background: #e9f3fc;
        color: #0b4f93;
        border: 1px solid #cfe1f5;
        text-decoration: none;
    }

    .btn-secondary:hover{
        filter: brightness(0.98);
    }
</style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
    <div class="logo">
        <img src="../../assets/images/logo.png" alt="Logo">
        <span>PULMO TECHNOLOGIES</span>
    </div>
        <ul class="nav-links">
        <li><a href="../dashboard.html">Dashboard</a></li>
        <li><a href="../products/product-list.html">Products</a></li>
        <li><a href="../products/general-machine.html">Machines</a></li>
        <li><a href="../customers/customer-list.html">Customers</a></li>
        <li><a href="../invoices/invoice-list.html">Invoices</a></li>
        <li><a href="../vendors/list-vendor.html">Vendors</a></li>
        <li><a href="../expenses/expense-list.html">Expenses</a></li>
        <li><a href="../reports/sales-report.html">Reports</a></li>
        <li><a href="../analytics/sales-chart.html">Analytics</a></li>
    </ul>
</div>

<!-- Main Content -->
<div class="main-content">
    <header><h2>Edit Customer</h2></header>

    <div class="form-container">
        <form id="customerForm">
            <label>Customer Name</label>
            <input type="text" id="name" class="uppercase-input" placeholder="Customer Name" required>

            <label>Address</label>
            <input type="text" id="address" class="uppercase-input" placeholder="Address">

            <label>Quatation 2 Address</label>
            <input type="text" id="quotation2Address" class="uppercase-input" placeholder="Quatation 2 Address">

            <label>Telephone</label>
            <input type="text" id="tel" placeholder="Telephone">
            <label>Contact person</label>
            <input type="text" id="contactPerson" placeholder="Contact person">

            <label>Email</label>
            <input type="email" id="email" placeholder="Email">

            <label>Customer Type</label>
            <select id="customerType">
                <option value="Silver">Silver</option>
                <option value="Bronze">Bronze</option>
                <option value="Gold">Gold</option>
                <option value="Platinum">Platinum</option>
            </select>

            <label>Customer Mode</label>
            <select id="customerMode">
                <option value="General">General</option>
                <option value="Rental">Rental</option>
            </select>

            <label>VAT Number</label>
            <input type="text" id="vatNumber" placeholder="VAT Number (Optional)">

            <div class="form-actions">
                <button type="submit">Update Customer</button>
                <a class="btn btn-secondary" href="customer-list.html">Back</a>
            </div>
        </form>
    </div>
</div>

<script src="../../assets/js/api.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const customerId = params.get("id");
const uppercaseFields = ["name", "address", "quotation2Address"];

uppercaseFields.forEach((fieldId) => {
    const field = document.getElementById(fieldId);
    if(!field) return;
    field.addEventListener("input", () => {
        field.value = field.value.toUpperCase();
    });
});

if(!customerId){
    alert("Missing customer id.");
    window.location.href = "customer-list.html";
}

async function loadCustomer(){
    try{
        const customer = await request(`/customers/${customerId}`,"GET");
        document.getElementById("name").value = (customer.name || "").toUpperCase();
        document.getElementById("address").value = (customer.address || "").toUpperCase();
        document.getElementById("quotation2Address").value = (customer.quotation2_address || "").toUpperCase();
        document.getElementById("tel").value = customer.tel || "";
        document.getElementById("contactPerson").value = customer.contact_person || "";
        document.getElementById("email").value = customer.email || "";
        document.getElementById("customerType").value = customer.customer_type || "Silver";
        document.getElementById("customerMode").value = customer.customer_mode || "General";
        document.getElementById("vatNumber").value = customer.vat_number || "";
    }catch(err){
        alert(err.message || "Failed to load customer");
        window.location.href = "customer-list.html";
    }
}

document.getElementById("customerForm").addEventListener("submit", async function(e){
    e.preventDefault();
    const data = {
        name: document.getElementById("name").value.trim().toUpperCase(),
        address: document.getElementById("address").value.trim().toUpperCase(),
        quotation2_address: document.getElementById("quotation2Address").value.trim().toUpperCase(),
        tel: document.getElementById("tel").value.trim(),
        contact_person: document.getElementById("contactPerson").value.trim(),
        email: document.getElementById("email").value.trim(),
        customer_type: document.getElementById("customerType").value,
        customer_mode: document.getElementById("customerMode").value,
        vat_number: document.getElementById("vatNumber").value.trim()
    };

    try{
        await request(`/customers/${customerId}`,"PUT",data);
        showMessageBox("Customer updated successfully!");
    }catch(err){
        alert(err.message || "Failed to update customer");
    }
});

function logout(){
    localStorage.removeItem("token");
    localStorage.removeItem("role");
    window.location.href="../login.html";
}

loadCustomer();
</script>
</body>
</html>
