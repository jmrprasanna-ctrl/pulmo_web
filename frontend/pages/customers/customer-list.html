<div class="main-content">
    <header><h2>Customers List</h2></header>

    <div class="form-container customer-shell">
        <a class="icon-btn" href="add-customer.html" id="addCustomerBtn" aria-label="Add customer" title="Add customer">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 5v14M5 12h14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
        </a>
        <button class="icon-btn" id="exportPdfBtn" type="button" onclick="exportPDF()" aria-label="Export as PDF" title="Export as PDF">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M7 3.5h7l4 4V19a1.5 1.5 0 0 1-1.5 1.5h-9A1.5 1.5 0 0 1 6 19V5A1.5 1.5 0 0 1 7.5 3.5Z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>

                <path d="M12 10.5v6M9.5 14l2.5 2.5L14.5 14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </button>
        <input type="text" id="customerSearch" class="search-inline" placeholder="Search ID, Name, Tel, Email">
        <select id="customerModeFilter" class="search-inline" style="width:170px;">
            <option value="">All Modes</option>
            <option value="general">General</option>
            <option value="rental">Rental</option>
        </select>
        <div class="customer-table-wrap">
            <table id="customerTable">
                <thead>
                    <tr>
                        <th>Customer ID</th>
                        <th>Name</th>
                        <th>Address</th>
                        <th>Tel</th>
                        <th>Email</th>
                        <th>VAT</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
