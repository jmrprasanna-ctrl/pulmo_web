<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer List - PULMO TECHNOLOGIES</title>
<link rel="stylesheet" href="../../assets/css/style.css">
<link rel="stylesheet" href="../../assets/css/dashboard.css">
<style>
    .btn-inline{
        height: 36px;
        padding: 0 12px;
        margin-left: 8px;
        margin-top: 0;
    }
    .customer-action-row{
        display:flex;
        gap:8px;
        align-items:center;
        flex-wrap:nowrap;
        white-space:nowrap;
    }
    .customer-action-btn{
        width:84px;
        min-width:84px;
        margin-top:0;
        margin-left:0;
    }
    .search-inline{
        width: 280px;
        max-width: 100%;
        margin-top: 0;
        display: inline-block;
        vertical-align: middle;
    }
    .customer-shell{
        overflow: visible !important;
    }
    .customer-table-wrap{
        width:100%;
        overflow-x:auto;
        margin-top:12px;
    }
    @media (max-width: 900px){
        .customer-action-row{
            flex-direction: row !important;
            align-items: center !important;
            flex-wrap: nowrap !important;
        }
        .customer-action-row > *{
            width: auto !important;
        }
    }
</style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
    <div class="logo">
        <img src="../../assets/images/logo.png" alt="Logo">
        <span>PULMO TECHNOLOGIES</span>
    </div>
        <ul class="nav-links">
        <li><a href="../dashboard.html">Dashboard</a></li>
        <li><a href="../products/product-list.html">Products</a></li>
        <li><a href="../products/general-machine.html">Machines</a></li>
        <li><a href="../customers/customer-list.html">Customers</a></li>
        <li><a href="../invoices/invoice-list.html">Invoices</a></li>
        <li><a href="../vendors/list-vendor.html">Vendors</a></li>
        <li><a href="../expenses/expense-list.html">Expenses</a></li>
        <li><a href="../reports/sales-report.html">Reports</a></li>
        <li><a href="../analytics/sales-chart.html">Analytics</a></li>
    </ul>
</div>

<div class="main-content">
    <header><h2>Customers List</h2></header>

    <div class="form-container customer-shell">
        <a class="btn" href="add-customer.html" id="addCustomerBtn">Add</a>
        <button onclick="exportPDF()">Export as PDF</button>
        <input type="text" id="customerSearch" class="search-inline" placeholder="Search ID, Name, Tel, Email">
        <select id="customerModeFilter" class="search-inline" style="width:170px;">
            <option value="">All Modes</option>
            <option value="general">General</option>
            <option value="rental">Rental</option>
        </select>
        <div class="customer-table-wrap">
            <table id="customerTable">
                <thead>
                    <tr>
                        <th>Customer ID</th>
                        <th>Name</th>
                        <th>Address</th>
                        <th>Tel</th>
                        <th>Email</th>
                        <th>VAT</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<script src="../../assets/js/api.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
const role = (localStorage.getItem("role") || "").toLowerCase();
const selectedDb = (localStorage.getItem("selectedDatabaseName") || "").toLowerCase();
const isTrainingUser = role === "user" && selectedDb === "demo";
const canManage = role === "admin" || role === "manager" || isTrainingUser;
const allowedPaths = (() => {
    try{
        const rows = JSON.parse(localStorage.getItem("userAllowedPathsRuntime") || "[]");
        return new Set((Array.isArray(rows) ? rows : []).map((x) => String(x || "").trim().toLowerCase()));
    }catch(_err){
        return new Set();
    }
})();
const canAccessPath = (path) => canManage
    ? true
    : (role === "user" && allowedPaths.has(String(path || "").trim().toLowerCase()));
const canAddCustomer = canAccessPath("/customers/add-customer.html");
const customerSearchEl = document.getElementById("customerSearch");
const customerModeFilterEl = document.getElementById("customerModeFilter");
let allCustomers = [];

const addCustomerBtn = document.getElementById("addCustomerBtn");
if(addCustomerBtn && !canAddCustomer){
    addCustomerBtn.style.display = "none";
}

if(!canManage){
    const actionHeader = document.querySelector("#customerTable thead th:last-child");
    if(actionHeader && actionHeader.innerText.toLowerCase().includes("action")){
        actionHeader.remove();
    }
}

function renderCustomers(customers){
    const tbody = document.querySelector("#customerTable tbody");
    tbody.innerHTML = "";
    customers.forEach(c=>{
        const tr = document.createElement("tr");
        tr.innerHTML = `
            <td>${c.customer_id || ""}</td>
            <td>${c.name}</td>
            <td>${c.address}</td>
            <td>${c.tel}</td>
            <td>${c.email}</td>
            <td>${String(c.vat_number || "").trim() ? "Yes" : "No"}</td>
        `;
        if(canManage){
            tr.innerHTML += `
                <td>
                    <div class="customer-action-row">
                        <a class="btn customer-action-btn" href="edit-customer.html?id=${c.id}">Edit</a>
                        <button class="btn btn-danger btn-inline customer-action-btn" type="button" onclick="deleteCustomer(${c.id})">Delete</button>
                    </div>
                </td>
            `;
        }
        tbody.appendChild(tr);
    });
}

function applyCustomerFilter(){
    const query = (customerSearchEl?.value || "").trim().toLowerCase();
    const mode = (customerModeFilterEl?.value || "").trim().toLowerCase();
    if(!query && !mode){
        renderCustomers(allCustomers);
        return;
    }
    const filtered = allCustomers.filter(c => {
        const modeMatch = !mode || String(c.customer_mode || "").toLowerCase() === mode;
        if(!modeMatch) return false;
        return [c.customer_id, c.name, c.tel, c.email].some(v => String(v || "").toLowerCase().includes(query));
    });
    renderCustomers(filtered);
}

async function loadCustomers(){
    try{
        allCustomers = await request("/customers","GET");
        applyCustomerFilter();
    }catch(err){
        alert("Failed to load customers");
    }
}

if(customerSearchEl){
    customerSearchEl.addEventListener("input", applyCustomerFilter);
}
if(customerModeFilterEl){
    customerModeFilterEl.addEventListener("change", applyCustomerFilter);
}

function exportPDF(){
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ format: "a4" });
    doc.setFontSize(10);
    doc.text("Customers List",14,20);
    let y = 30;
    const rows = document.querySelectorAll("#customerTable tbody tr");
    rows.forEach(r=>{
        const cells = Array.from(r.children).slice(0, 5).map(td=>td.innerText);
        doc.text(cells.join(" | "),14,y);
        y+=8;
    });
    doc.save("Customers_List.pdf");
}

async function deleteCustomer(id){
    if(!confirm("Delete this customer?")) return;
    try{
        await request(`/customers/${id}`,"DELETE");
        showMessageBox("Customer deleted");
        loadCustomers();
    }catch(err){
        alert(err.message || "Failed to delete customer");
    }
}

function logout(){
    localStorage.removeItem("token");
    localStorage.removeItem("role");
    window.location.href="../login.html";
}

loadCustomers();
</script>
</body>
</html>
