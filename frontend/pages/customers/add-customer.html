</head>
<body>

                
<div class="sidebar">
    <div class="logo">
        <img src="../../assets/images/logo.png" alt="Logo">
        <span>PULMO TECHNOLOGIES</span>
    </div>
        <ul class="nav-links">
        <li><a href="../dashboard.html">Dashboard</a></li>

<div class="main-content add-product-main">
    <div class="add-product-shell">
        <div class="add-product-header">
            <div>
                <h2 class="add-product-title">Add Customer</h2>
            </div>
            <div class="add-product-badge">Customer Setup</div>
        </div>

        <form id="customerForm">
            <div class="add-product-grid">
                <div class="field">
                    <label for="name">Customer Name</label>
                    <input type="text" id="name" class="uppercase-input" placeholder="Customer Name" required>
                </div>

                <div class="field">
                    <label for="address">Address</label>
                    <input type="text" id="address" class="uppercase-input" placeholder="Address" required>
                </div>

                <div class="field">
                    <label for="quotation2Address">Quatation 2 Address</label>
                    <input type="text" id="quotation2Address" class="uppercase-input" placeholder="Quatation 2 Address">
                </div>

                <div class="field">
                    <label for="tel">Tel</label>
                    <input type="text" id="tel" placeholder="Telephone" required>
                </div>
                <div class="field">
                    <label for="contactPerson">Contact person</label>
                    <input type="text" id="contactPerson" placeholder="Contact person">
                </div>

                <div class="field">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Email" required>
                </div>

                <div class="field">
                    <label for="customerType">Customer Type</label>
                    <select id="customerType" required>
                        <option value="">Select Type</option>
                        <option value="Silver">Silver</option>
                        <option value="Bronze">Bronze</option>
                        <option value="Gold">Gold</option>
                        <option value="Platinum">Platinum</option>
                    </select>
                </div>

                <div class="field">
                    <label for="customerMode">Customer Mode</label>
                    <select id="customerMode" required>
                        <option value="">Select Mode</option>
                        <option value="General">General</option>
                        <option value="Rental">Rental</option>
                    </select>
                </div>

                <div class="field">
                    <label for="vatNumber">VAT Number</label>
                    <input type="text" id="vatNumber" placeholder="VAT Number (Optional)">
                </div>
            </div>

            <div class="add-product-actions">
                <button type="submit">Save Customer</button>
                <button class="btn btn-secondary" type="button" onclick="window.location.href='customer-list.html'">Back</button>
            </div>
        </form>
    </div>
</div>

<script src="../../assets/js/api.js"></script>
<script src="../../assets/extracted/pages/customers/add-customer.inline-script-1.js"></script>
</body>
</html>
