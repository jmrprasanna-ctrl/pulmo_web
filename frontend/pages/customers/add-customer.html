<div class="main-content">
    <header class="page-head">
        <h2>Add Customer</h2>
        <a class="icon-btn" href="customer-list.html" aria-label="Back to customers list" title="Back to customers list">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M14.5 6.5 9 12l5.5 5.5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </a>
    </header>

    <div class="form-container add-product-shell">
        <form id="customerForm">
            <div class="add-product-grid">
                <div class="field">
                    <label for="name">Customer Name</label>
                    <input type="text" id="name" class="uppercase-input" placeholder="Customer Name" required>
                </div>

                <div class="field">
                    <label for="address">Address</label>
                    <input type="text" id="address" class="uppercase-input" placeholder="Address" required>
                </div>

                <div class="field">
                    <label for="quotation2Address">Quatation 2 Address</label>
                    <input type="text" id="quotation2Address" class="uppercase-input" placeholder="Quatation 2 Address">
                </div>

                <div class="field">
                    <label for="tel">Tel</label>
                    <input type="text" id="tel" placeholder="Telephone" required>
                </div>
                <div class="field">
                    <label for="contactPerson">Contact person</label>
                    <input type="text" id="contactPerson" placeholder="Contact person">
                </div>

                <div class="field">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Email" required>
                </div>

                <div class="field">
                    <label for="customerType">Customer Type</label>
                    <select id="customerType" required>
                        <option value="">Select Type</option>
                        <option value="Silver">Silver</option>
                        <option value="Bronze">Bronze</option>
                        <option value="Gold">Gold</option>
                        <option value="Platinum">Platinum</option>
                    </select>
                </div>

                <div class="field">
                    <label for="customerMode">Customer Mode</label>
                    <select id="customerMode" required>
                        <option value="">Select Mode</option>
                        <option value="General">General</option>
                        <option value="Rental">Rental</option>
                    </select>
                </div>

                <div class="field">
                    <label for="vatNumber">VAT Number</label>
                    <input type="text" id="vatNumber" placeholder="VAT Number (Optional)">
                </div>
            </div>

            <div class="add-product-actions">
                <button type="submit" class="icon-btn" aria-label="Save customer" title="Save customer">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M5.5 3.5h11l2 2V20.5H5.5Z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
                        <path d="M8 3.5v5h7v-5" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
                        <path d="M8 14h8" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
                    </svg>
                </button>
            </div>
        </form>
    </div>
</div>
