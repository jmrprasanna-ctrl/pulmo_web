<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Access - PULMO TECHNOLOGIES</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="stylesheet" href="../../assets/css/dashboard.css">
    <link rel="stylesheet" href="../../assets/extracted/pages/users/user-access.inline-style-1.css">
</head>
<body>
    <div class="sidebar">
        <div class="logo">
            <img src="../../assets/images/logo.png" alt="Company Logo">
            <span>PULMO TECHNOLOGIES</span>
        </div>
        <ul class="nav-links">
            <li><a href="../dashboard.html">Dashboard</a></li>
            <li><a href="../products/product-list.html">Products</a></li>
            <li><a href="../products/general-machine.html">Machines</a></li>
            <li><a href="../customers/customer-list.html">Customers</a></li>
            <li><a href="../invoices/invoice-list.html">Invoices</a></li>
            <li><a href="../vendors/list-vendor.html">Vendors</a></li>
            <li><a href="../expenses/expense-list.html">Expenses</a></li>
            <li><a href="../reports/sales-report.html">Reports</a></li>
            <li><a href="../analytics/sales-chart.html">Analytics</a></li>
        </ul>
    </div>

    <div class="main-content">
        <header class="page-head">
            <h2>User Access</h2>
            <a class="icon-btn" href="user-list.html" aria-label="Back to user list" title="Back to user list">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M14.5 6.5 9 12l5.5 5.5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </a>
        </header>

        <div class="form-container access-shell">
            <div class="access-grid">
                <div>
                    <label for="userSelect">Select User (Admin / Manager / User / Demo Users)</label>
                    <select id="userSelect">
                        <option value="">Select user</option>
                    </select>
                </div>
                <div>
                    <label for="databaseSelect">Default Database</label>
                    <select id="databaseSelect">
                        <option value="">Select database</option>
                    </select>
                </div>
                <div>
                    <label for="superUserCheckbox">Super User</label>
                    <div class="super-user-row">
                        <input id="superUserCheckbox" type="checkbox" class="super-user-checkbox">
                        <span class="path-hint">Protect admin from other admins (edit/delete/view).</span>
                    </div>
                </div>
            </div>

            <label>Page Access Matrix (View / Add / Edit / Delete)</label>
            <div class="access-matrix" id="accessMatrix"></div>

            <div class="access-actions">
                <button class="btn btn-primary" id="saveAccessBtn" type="button">Save</button>
                <button class="btn btn-primary" id="loadAccessBtn" type="button">Load</button>
                <a class="btn btn-primary" href="db-create.html">DB Create</a>
                <a class="btn btn-primary" href="company-create.html">Company Create</a>
                <a class="btn btn-primary" href="mapped.html">Mapped</a>
                <a class="btn btn-primary" href="inv-map.html">Inv Map</a>
                <button class="btn btn-secondary" id="selectAllAccessBtn" type="button">Select All</button>
                <button class="btn btn-secondary" id="clearAccessBtn" type="button">Clear</button>
            </div>
        </div>
    </div>

    <script src="../../assets/js/api.js"></script>
    <script src="../../assets/extracted/pages/users/user-access.inline-script-1.js"></script>
</body>
</html>
