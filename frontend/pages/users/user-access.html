<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Access - PULMO TECHNOLOGIES</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="stylesheet" href="../../assets/css/dashboard.css">
    <link rel="stylesheet" href="../../assets/extracted/pages/users/user-access.inline-style-1.css">
</head>
<body>
    <div class="sidebar">
        <div class="logo">
            <img src="../../assets/images/logo.png" alt="Company Logo">
            <span>PULMO TECHNOLOGIES</span>
        </div>
        <ul class="nav-links">
            <li><a href="../dashboard.html">Dashboard</a></li>
            <li><a href="../products/product-list.html">Products</a></li>
            <li><a href="../products/general-machine.html">Machines</a></li>
            <li><a href="../customers/customer-list.html">Customers</a></li>
            <li><a href="../invoices/invoice-list.html">Invoices</a></li>
            <li><a href="../vendors/list-vendor.html">Vendors</a></li>
            <li><a href="../expenses/expense-list.html">Expenses</a></li>
            <li><a href="../reports/sales-report.html">Reports</a></li>
            <li><a href="../analytics/sales-chart.html">Analytics</a></li>
        </ul>
    </div>

    <div class="main-content">
        <header class="page-head">
            <h2>User Access</h2>
            <a class="icon-btn" href="user-list.html" aria-label="Back to user list" title="Back to user list">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M14.5 6.5 9 12l5.5 5.5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </a>
        </header>
        <div class="access-top-actions">
            <button class="icon-btn" id="loadAccessBtn" type="button" aria-label="Load access" title="Load access">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M12 5v9M8.5 10.5 12 14l3.5-3.5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M5.5 18.5h13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                </svg>
            </button>
            <button class="icon-btn" id="selectAllAccessBtn" type="button" aria-label="Select all access" title="Select all access">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M9 7h8M9 12h8M9 17h8" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                    <path d="m5 7 1.4 1.4L8.8 6M5 12l1.4 1.4L8.8 11M5 17l1.4 1.4L8.8 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
            <button class="icon-btn" id="clearAccessBtn" type="button" aria-label="Clear access" title="Clear access">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M6 6l12 12M18 6 6 18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                </svg>
            </button>
        </div>

        <div class="form-container access-shell">
            <div class="access-grid">
                <div>
                    <label for="userSelect">Select User (Admin / Manager / User / Demo Users)</label>
                    <select id="userSelect">
                        <option value="">Select user</option>
                    </select>
                </div>
                <div>
                    <label for="databaseSelect">Default Database</label>
                    <select id="databaseSelect">
                        <option value="">Select database</option>
                    </select>
                </div>
                <div>
                    <label for="superUserCheckbox">Super User</label>
                    <div class="super-user-row">
                        <input id="superUserCheckbox" type="checkbox" class="super-user-checkbox">
                        <span class="path-hint">Protect admin from other admins (edit/delete/view).</span>
                    </div>
                </div>
            </div>

            <label>Page Access Matrix (View / Add / Edit / Delete)</label>
            <div class="access-matrix" id="accessMatrix"></div>

            <div class="access-actions">
                <button class="icon-btn" id="saveAccessBtn" type="button" aria-label="Save access" title="Save access">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M5.5 3.5h11l2 2V20.5H5.5Z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
                        <path d="M8 3.5v5h7v-5" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
                        <path d="M8 14h8" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
                    </svg>
                </button>
                <a class="btn btn-primary" href="db-create.html">DB Create</a>
                <a class="btn btn-primary" href="company-create.html">Company Create</a>
                <a class="btn btn-primary" href="mapped.html">Mapped</a>
                <a class="btn btn-primary" href="inv-map.html">Inv Map</a>
            </div>
        </div>
    </div>

    <script src="../../assets/js/api.js"></script>
    <script src="../../assets/extracted/pages/users/user-access.inline-script-1.js"></script>
</body>
</html>
