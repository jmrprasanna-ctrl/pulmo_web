<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Technician - PULMO TECHNOLOGIES</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="stylesheet" href="../../assets/css/dashboard.css">
    <link rel="stylesheet" href="../../assets/css/technicians.css">
</head>
<body>
    <div id="sidebar-container"></div>
    <div id="navbar-container"></div>

    <div class="main-content">
        <header><h2>Add Technician</h2></header>
        <div class="form-container">
            <form id="addTechnicianForm">
                <label for="technicianName">Technician Name</label>
                <input type="text" id="technicianName" placeholder="Enter technician name" required>

                <label for="company">Company</label>
                <input type="text" id="company" placeholder="Enter company name" required>

                <label for="department">Department</label>
                <input type="text" id="department" placeholder="Enter department" required>

                <label for="tel">Telephone</label>
                <input type="text" id="tel" placeholder="Enter telephone" required>

                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Enter email" required>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Save Technician</button>
                    <a class="btn btn-secondary" href="technician-list.html">Back</a>
                </div>
            </form>
        </div>
    </div>

    <script src="../../assets/js/api.js"></script>
    <script src="../../assets/extracted/pages/users/add-technician.inline-script-1.js"></script>
</body>
</html>
