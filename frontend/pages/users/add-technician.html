<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Technician - PULMO TECHNOLOGIES</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="stylesheet" href="../../assets/css/dashboard.css">
    <link rel="stylesheet" href="../../assets/css/technicians.css">
</head>
<body>
    <div class="sidebar">
        <div class="logo">
            <img src="../../assets/images/logo.png" alt="Logo">
            <span>PULMO TECHNOLOGIES</span>
        </div>
        <ul class="nav-links">
            <li><a href="../dashboard.html">Dashboard</a></li>
            <li><a href="../products/product-list.html">Products</a></li>
            <li><a href="../products/general-machine.html">Machines</a></li>
            <li><a href="../customers/customer-list.html">Customers</a></li>

            <li><a href="../vendors/list-vendor.html">Vendors</a></li>
            <li><a href="../expenses/expense-list.html">Expenses</a></li>
            <li><a href="../reports/sales-report.html">Reports</a></li>
            <li><a href="../analytics/sales-chart.html">Analytics</a></li>
        </ul>
    </div>

    <div class="main-content">
        <header class="page-head">
            <h2>Add Technician</h2>
            <a class="icon-btn" href="technician-list.html" aria-label="Back to technician list" title="Back to technician list">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M14.5 6.5 9 12l5.5 5.5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </a>
        </header>
        <div class="form-container">
            <form id="addTechnicianForm">
                <label for="technicianName">Technician Name</label>
                <input type="text" id="technicianName" placeholder="Enter technician name" required>

                <label for="company">Company</label>
                <input type="text" id="company" placeholder="Enter company name" required>

                <label for="department">Department</label>
                <input type="text" id="department" placeholder="Enter department" required>

                <label for="tel">Telephone</label>
                <input type="text" id="tel" placeholder="Enter telephone" required>

                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Enter email" required>

                <div class="form-actions">
                    <button type="submit" class="icon-btn" aria-label="Save technician" title="Save technician">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M5.5 3.5h11l2 2V20.5H5.5Z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
                            <path d="M8 3.5v5h7v-5" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
                            <path d="M8 14h8" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
                        </svg>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="../../assets/js/api.js"></script>
    <script src="../../assets/extracted/pages/users/add-technician.inline-script-1.js"></script>
</body>
