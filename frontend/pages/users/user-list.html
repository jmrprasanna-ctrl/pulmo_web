<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User List - PULMO TECHNOLOGIES</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="stylesheet" href="../../assets/css/dashboard.css">
    <style>
        .form-actions{
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }
        @media (max-width: 900px){
            .form-actions{
                flex-direction: row !important;
                align-items: center !important;
            }
            .form-actions .btn{
                width: auto !important;
            }
        }
        .btn-secondary{
            background: #e9f3fc;
            color: #0b4f93;
            border: 1px solid #cfe1f5;
            text-decoration: none;
        }
        .btn-secondary:hover{
            filter: brightness(0.98);
        }
        .action-btn{
            width: 84px;
            min-width: 84px;
            height: 36px;
            padding: 0 12px;
            margin-top: 0;
        }
        .user-action-row{
            display:flex;
            gap:8px;
            align-items:center;
            flex-wrap:nowrap;
            white-space:nowrap;
        }
        @media (max-width: 900px){
            .user-action-row{
                flex-direction: row !important;
                align-items: center !important;
                flex-wrap: nowrap !important;
            }
            .user-action-row > *{
                width: auto !important;
            }
        }
    </style>
</head>
<body>
    <!-- Sidebar & Navbar -->
    <div id="sidebar-container"></div>
    <div id="navbar-container"></div>

    <div class="main-content">
        <header><h2>User List</h2></header>
        <div class="form-actions">
            <button id="btnAddUser" class="btn btn-primary" style="display:none" onclick="window.location.href='add-user.html'">Add User</button>
            <button id="btnPreference" class="btn btn-primary" style="display:none" onclick="window.location.href='preference.html'">Preference</button>
            <button id="btnAccess" class="btn btn-primary" style="display:none" onclick="window.location.href='user-access.html'">Access</button>
            <button id="btnLogged" class="btn btn-primary" style="display:none" onclick="window.location.href='user-logged.html'">Logged</button>
            <button id="btnEmailSetup" class="btn btn-primary" style="display:none" onclick="window.location.href='../support/email-setup.html'">email</button>
            <button id="btnCheckTools" class="btn btn-primary" style="display:none" type="button" onclick="checkBackupTools()">Check Tools</button>
            <button id="btnBackup" class="btn btn-primary" style="display:none" type="button" onclick="downloadSystemBackup()">Backup</button>
            <button id="btnUploadDb" class="btn btn-primary" style="display:none" type="button" onclick="openRestorePicker()">Upload DB</button>
            <input id="restore-db-file" type="file" accept=".sql" style="display:none" onchange="restoreSystemBackup(event)">
            <a class="btn btn-secondary" href="../dashboard.html">Back</a>
        </div>

        <section class="health-panel" id="healthPanel" aria-live="polite">
            <div class="health-head">
                <h3>System Health</h3>
                <button class="btn btn-secondary" type="button" id="healthRefreshBtn">Refresh</button>
            </div>
            <div class="health-grid">
                <div class="health-item"><span class="health-label">Overall</span><span class="health-badge unknown" id="healthOverall">Unknown</span></div>
                <div class="health-item"><span class="health-label">Database</span><span class="health-badge unknown" id="healthDb">Unknown</span></div>
                <div class="health-item"><span class="health-label">pg_dump</span><span class="health-badge unknown" id="healthPgDump">Unknown</span></div>
                <div class="health-item"><span class="health-label">psql</span><span class="health-badge unknown" id="healthPsql">Unknown</span></div>
                <div class="health-item"><span class="health-label">Invoice Template</span><span class="health-badge unknown" id="healthTplInvoice">Unknown</span></div>
                <div class="health-item"><span class="health-label">Quotation Template</span><span class="health-badge unknown" id="healthTplQuotation">Unknown</span></div>
                <div class="health-item"><span class="health-label">Quotation2 Template</span><span class="health-badge unknown" id="healthTplQuotation2">Unknown</span></div>
            </div>
            <p class="muted" id="healthUpdatedAt" style="margin:10px 0 0 0;">Last updated: -</p>
        </section>

        <div class="card">
            <table class="table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Username</th>
                        <th>Company</th>
                        <th>Department</th>
                        <th>Telephone</th>
                        <th>Email</th>
                        <th>Role</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="user-table-body"></tbody>
            </table>
        </div>
    </div>

    <script src="../../assets/js/api.js?v=20260324p4"></script>
    <script>
        function canShowAdminTool(path){
            const role = (localStorage.getItem("role") || "").toLowerCase();
            const hasConfiguredAccess = typeof hasAccessConfigRestrictions === "function" && hasAccessConfigRestrictions();
            const hasPageAccess = (
                (typeof hasUserGrantedPath === "function" && hasUserGrantedPath(path))
                || (typeof hasUserActionPermission === "function" && hasUserActionPermission(path, "view"))
            );
            if(role === "admin"){
                if(!hasConfiguredAccess) return true;
                return hasPageAccess;
            }
            if(role === "manager"){
                if(!hasConfiguredAccess) return false;
                return hasPageAccess;
            }
            return hasPageAccess;
        }

        function applyTopButtonVisibility(){
            const map = [
                { id: "btnAddUser", path: "/users/add-user.html" },
                { id: "btnPreference", path: "/users/preference.html" },
                { id: "btnAccess", path: "/users/user-access.html" },
                { id: "btnLogged", path: "/users/user-logged.html" },
                { id: "btnEmailSetup", path: "/support/email-setup.html" },
                { id: "btnCheckTools", path: "/tools/check-backup.html" },
                { id: "btnBackup", path: "/tools/backup-download.html" },
                { id: "btnUploadDb", path: "/tools/upload-db.html" }
            ];
            map.forEach((item) => {
                const el = document.getElementById(item.id);
                if(!el) return;
                el.style.display = canShowAdminTool(item.path) ? "" : "none";
            });
        }

        async function loadUsers(){
            try{
                const users = await request("/users","GET");
                const tbody = document.getElementById('user-table-body');
                tbody.innerHTML = '';
                const canEditUser = typeof hasUserActionPermission === "function"
                    && hasUserActionPermission("/users/user-list.html", "edit");
                const canDeleteUser = typeof hasUserActionPermission === "function"
                    && hasUserActionPermission("/users/user-list.html", "delete");
                users.forEach(u => {
                    const rowActions = [];
                    if(canEditUser){
                        rowActions.push(`<a class="btn btn-inline action-btn" href="edit-user.html?id=${u.id}">Edit</a>`);
                    }
                    if(canDeleteUser){
                        rowActions.push(`<button class="btn btn-danger btn-inline action-btn" type="button" onclick="deleteUser(${u.id})">Delete</button>`);
                    }
                    const actionHtml = rowActions.length
                        ? rowActions.join("")
                        : `<span class="muted">No actions</span>`;
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${u.id}</td>
                        <td>${u.username}</td>
                        <td>${u.company || ""}</td>
                        <td>${u.department || ""}</td>
                        <td>${u.telephone || ""}</td>
                        <td>${u.email}</td>
                        <td>${u.role}</td>
                        <td>
                            <div class="user-action-row">
                                ${actionHtml}
                            </div>
                        </td>
                    `;
                    tbody.appendChild(row);
                });
            }catch(err){
                alert(err.message || "Failed to load users");
            }
        }

        async function deleteUser(id){
            if(!confirm("Delete this user?")) return;
            try{
                await request(`/users/${id}`,"DELETE");
                showMessageBox("User deleted");
                loadUsers();
            }catch(err){
                alert(err.message || "Failed to delete user");
            }
        }

        function setHealthBadge(id, ok){
            const el = document.getElementById(id);
            if(!el) return;
            el.classList.remove("ok", "fail", "unknown");
            if(ok === true){
                el.classList.add("ok");
                el.innerText = "OK";
                return;
            }
            if(ok === false){
                el.classList.add("fail");
                el.innerText = "Fail";
                return;
            }
            el.classList.add("unknown");
            el.innerText = "Unknown";
        }

        async function loadSystemHealthPreview(){
            try{
                const health = await request("/health","GET");
                setHealthBadge("healthOverall", !!health.ok);
                setHealthBadge("healthDb", !!health.dbConnected);
                setHealthBadge("healthPgDump", !!health?.checks?.tools?.pg_dump?.available);
                setHealthBadge("healthPsql", !!health?.checks?.tools?.psql?.available);
                setHealthBadge("healthTplInvoice", !!health?.checks?.templateFiles?.invoice?.exists);
                setHealthBadge("healthTplQuotation", !!health?.checks?.templateFiles?.quotation?.exists);
                setHealthBadge("healthTplQuotation2", !!health?.checks?.templateFiles?.quotation2?.exists);
            }catch(_err){
                setHealthBadge("healthOverall", false);
                setHealthBadge("healthDb", null);
                setHealthBadge("healthPgDump", null);
                setHealthBadge("healthPsql", null);
                setHealthBadge("healthTplInvoice", null);
                setHealthBadge("healthTplQuotation", null);
                setHealthBadge("healthTplQuotation2", null);
            }

            const updated = document.getElementById("healthUpdatedAt");
            if(updated){
                updated.innerText = `Last updated: ${new Date().toLocaleString()}`;
            }
        }

        async function downloadSystemBackup(){
            const token = localStorage.getItem("token");
            if(!token){
                alert("Please login first.");
                return;
            }

            try{
                const apiBase = (
                    window.BASE_URL ||
                    `${window.location.origin.replace(/\/+$/, "")}/api`
                ).replace(/\/+$/, "");
                const res = await fetch(`${apiBase}/system-backup/download`, {
                    method: "GET",
                    headers: {
                        "Authorization": "Bearer " + token
                    }
                });

                if(!res.ok){
                    const raw = await res.text();
                    let message = "Failed to create backup";
                    try{
                        message = JSON.parse(raw).message || message;
                    }catch(_err){
                        if(raw) message = raw;
                    }
                    throw new Error(message);
                }

                const blob = await res.blob();
                const disposition = res.headers.get("Content-Disposition") || "";
                const fileNameMatch = disposition.match(/filename="([^"]+)"/i);
                const fileName = (fileNameMatch && fileNameMatch[1]) ? fileNameMatch[1] : `inventory_backup_${Date.now()}.sql`;

                // Prefer explicit Save As dialog on supported browsers (Chrome/Edge on localhost/https)
                if(window.showSaveFilePicker){
                    const handle = await window.showSaveFilePicker({
                        suggestedName: fileName,
                        types: [{
                            description: "SQL Backup File",
                            accept: {
                                "application/sql": [".sql"],
                                "text/sql": [".sql"],
                                "text/plain": [".sql"]
                            }
                        }]
                    });
                    const writable = await handle.createWritable();
                    await writable.write(blob);
                    await writable.close();
                }else{
                    // Fallback: browser downloads to default downloads folder
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement("a");
                    a.href = url;
                    a.download = fileName;
                    document.body.appendChild(a);
                    a.click();
                    a.remove();
                    window.URL.revokeObjectURL(url);
                }
                showMessageBox("Backup downloaded");
            }catch(err){
                if(err && err.name === "AbortError"){
                    return; // User canceled Save As dialog
                }
                alert(err.message || "Failed to create backup");
            }
        }

        async function checkBackupTools(){
            try{
                const status = await request("/system-backup/status", "GET");
                const pgDump = status?.tools?.pg_dump;
                const psql = status?.tools?.psql;
                if(status.ok){
                    showMessageBox("Backup tools are ready");
                    return;
                }
                alert(
                    `Tools not ready.\n\n` +
                    `pg_dump: ${pgDump?.available ? "OK" : "Missing"}\n` +
                    `Command: ${pgDump?.command || "N/A"}\n\n` +
                    `psql: ${psql?.available ? "OK" : "Missing"}\n` +
                    `Command: ${psql?.command || "N/A"}`
                );
            }catch(err){
                alert(err.message || "Failed to check backup tools");
            }
        }

        function openRestorePicker(){
            const input = document.getElementById("restore-db-file");
            input.value = "";
            input.click();
        }

        async function restoreSystemBackup(event){
            const file = event.target.files && event.target.files[0];
            if(!file) return;

            if(!file.name.toLowerCase().endsWith(".sql")){
                alert("Please select a .sql backup file");
                return;
            }

            if(!confirm("This will restore the uploaded SQL to the current database. Continue?")) return;

            try{
                const sqlText = await file.text();
                await request("/system-backup/restore", "POST", {
                    fileName: file.name,
                    sqlText
                });
                showMessageBox("Database restored");
            }catch(err){
                alert(err.message || "Failed to restore database");
            }
        }

        window.addEventListener('DOMContentLoaded', async () => {
            if(typeof window.__waitForUserAccessPermissions === "function"){
                await window.__waitForUserAccessPermissions();
            }
            applyTopButtonVisibility();
            const healthRefreshBtn = document.getElementById("healthRefreshBtn");
            if(healthRefreshBtn){
                healthRefreshBtn.addEventListener("click", loadSystemHealthPreview);
            }
            await loadSystemHealthPreview();
            await loadUsers();
        });
    </script>
</body>
</html>
