    <div class="main-content">
        <header class="page-head">
            <h2>Edit Profile</h2>
            <a class="icon-btn" href="profile-list.html" aria-label="Back to profile list" title="Back to profile list">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M14.5 6.5 9 12l5.5 5.5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </a>
        </header>

        <div class="form-container">
            <form id="editProfileForm">
                <div class="profile-picture-wrap">
                    <img id="profilePicturePreview" src="data:image/svg+xml;charset=UTF-8,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20width%3D%22120%22%20height%3D%22120%22%3E%3Crect%20width%3D%22100%25%22%20height%3D%22100%25%22%20rx%3D%2220%22%20ry%3D%2220%22%20fill%3D%22%23e8f2ff%22/%3E%3Ctext%20x%3D%2250%25%22%20y%3D%2254%25%22%20dominant-baseline%3D%22middle%22%20text-anchor%3D%22middle%22%20font-family%3D%22Segoe%20UI%2C%20Arial%2C%20sans-serif%22%20font-size%3D%2242%22%20font-weight%3D%22700%22%20fill%3D%22%230d4f90%22%3EU%3C/text%3E%3C/svg%3E" alt="Profile picture">
                    <div class="profile-picture-actions">
                        <label class="icon-btn" for="profilePictureFile" aria-label="Choose profile picture" title="Choose profile picture">
                            <svg viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M12 16V8M8.5 11.5 12 8l3.5 3.5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                                <path d="M5.5 17.5h13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                            </svg>
                        </label>
                        <input id="profilePictureFile" type="file" accept="image/*" class="is-hidden">
                    </div>
                </div>

                <div class="meta-grid">
                    <div class="meta-field">
                        <label for="metaLoginUser">Login User</label>
                        <input type="text" id="metaLoginUser" readonly>
                    </div>
                    <div class="meta-field">
                        <label for="metaEmail">Email</label>
                        <input type="text" id="metaEmail" readonly>
                    </div>
                    <div class="meta-field">
                        <label for="metaDepartment">Department</label>
                        <input type="text" id="metaDepartment" readonly>
                    </div>
                </div>

                <label for="profile_name">Profile Name</label>
                <input type="text" id="profile_name" placeholder="Profile Name" required>

                <label for="address">Address</label>
                <textarea id="address" placeholder="Address"></textarea>

                <label for="mobile">Mobile</label>
                <input type="text" id="mobile" placeholder="Mobile">

                <label for="id_number">ID Number</label>
                <input type="text" id="id_number" placeholder="ID Number">

                <label for="emergency_contact_no">Emergency Contact No</label>
                <input type="text" id="emergency_contact_no" placeholder="Emergency Contact No">

                <label for="authoris_officer">Authoris Officer</label>
                <input type="text" id="authoris_officer" placeholder="Authoris Officer">

                <div class="form-actions">
                    <button type="submit" class="icon-btn" aria-label="Save profile" title="Save profile">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M5.5 3.5h11l2 2V20.5H5.5Z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
                            <path d="M8 3.5v5h7v-5" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
                            <path d="M8 14h8" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
                        </svg>
                    </button>
                </div>
