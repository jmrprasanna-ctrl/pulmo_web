<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DB Create - PULMO TECHNOLOGIES</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="stylesheet" href="../../assets/css/dashboard.css">
    <style>
        .db-create-wrap{max-width:760px}
        .db-create-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        .db-table-wrap{margin-top:20px;overflow:auto}
        .db-table{width:100%;border-collapse:collapse;background:#fff}
        .db-table th,.db-table td{border-bottom:1px solid #e5edf5;padding:10px 8px;text-align:left;font-size:.9rem}
        .db-table th{background:#f5f9ff;color:#234b71}
        .db-table td.actions{text-align:right}
        @media (max-width: 900px){
            .db-create-grid{grid-template-columns:1fr}
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">
            <img src="../../assets/images/logo.png" alt="Company Logo">
            <span>PULMO TECHNOLOGIES</span>
        </div>
        <ul class="nav-links">
            <li><a href="../dashboard.html">Dashboard</a></li>
            <li><a href="../products/product-list.html">Products</a></li>
            <li><a href="../products/general-machine.html">Machines</a></li>
            <li><a href="../customers/customer-list.html">Customers</a></li>
            <li><a href="../invoices/invoice-list.html">Invoices</a></li>
            <li><a href="../vendors/list-vendor.html">Vendors</a></li>
            <li><a href="../expenses/expense-list.html">Expenses</a></li>
            <li><a href="../reports/sales-report.html">Reports</a></li>
            <li><a href="../analytics/sales-chart.html">Analytics</a></li>
        </ul>
    </div>

    <div class="main-content">
        <header><h2>Database Create</h2></header>

        <div class="form-container db-create-wrap">
            <div class="db-create-grid">
                <div>
                    <label for="databaseName">Database Name</label>
                    <input id="databaseName" type="text" placeholder="example: nishani_company_db">
                    <div class="path-hint">Allowed: lowercase letters, numbers, underscore</div>
                </div>
                <div>
                    <label for="companyName">Company Name</label>
                    <input id="companyName" type="text" placeholder="Company name">
                </div>
            </div>

            <div class="access-actions" style="margin-top: 16px; display:flex; gap:10px; flex-wrap:wrap;">
                <button id="saveDbBtn" class="btn btn-primary" type="button" onclick="saveDatabase()">Save</button>
                <a class="btn btn-secondary" href="user-access.html">Back</a>
            </div>

            <div class="db-table-wrap">
                <label>Created Databases (Super User Admin)</label>
                <table class="db-table">
                    <thead>
                        <tr>
                            <th>Database</th>
                            <th>Company</th>
                            <th>Created Date</th>
                            <th style="width: 120px;">Action</th>
                        </tr>
                    </thead>
                    <tbody id="createdDbTableBody">
                        <tr><td colspan="4">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="../../assets/js/api.js"></script>
    <script>
        const databaseNameEl = document.getElementById("databaseName");
        const companyNameEl = document.getElementById("companyName");
        const createdDbTableBodyEl = document.getElementById("createdDbTableBody");
        const saveDbBtnEl = document.getElementById("saveDbBtn");
        const DB_CREATE_PATH = "/users/db-create.html";
        let canAddDb = false;
        let canDeleteDb = false;

        function sanitizeDbName(value){
            return String(value || "")
                .trim()
                .toLowerCase()
                .replace(/\s+/g, "_")
                .replace(/[^a-z0-9_]/g, "")
                .replace(/_+/g, "_")
                .replace(/^_+|_+$/g, "");
        }

        async function saveDatabase(){
            if(!canAddDb){
                alert("You do not have add permission for DB Create page.");
                return;
            }
            const databaseName = sanitizeDbName(databaseNameEl.value);
            const companyName = String(companyNameEl.value || "").trim();

            if(!databaseName){
                alert("Please enter valid database name.");
                return;
            }
            if(!companyName){
                alert("Please enter company name.");
                return;
            }

            try{
                const res = await request("/users/databases/create", "POST", {
                    database_name: databaseName,
                    company_name: companyName
                });
                showMessageBox(res.message || "Database created");
                await loadCreatedDatabases();
                setTimeout(() => {
                    window.location.href = "user-access.html";
                }, 500);
            }catch(err){
                alert(err.message || "Failed to create database");
            }
        }

        function formatDate(value){
            if(!value) return "-";
            const dt = new Date(value);
            if(Number.isNaN(dt.getTime())) return "-";
            return dt.toLocaleDateString();
        }

        async function loadCreatedDatabases(){
            createdDbTableBodyEl.innerHTML = `<tr><td colspan="4">Loading...</td></tr>`;
            try{
                const res = await request("/users/databases/created", "GET");
                const rows = Array.isArray(res.databases) ? res.databases : [];
                if(!rows.length){
                    createdDbTableBodyEl.innerHTML = `<tr><td colspan="4">No created databases found.</td></tr>`;
                    return;
                }
                createdDbTableBodyEl.innerHTML = "";
                rows.forEach((row) => {
                    const tr = document.createElement("tr");
                    const deleteAction = canDeleteDb
                        ? `<button class="btn btn-secondary" type="button" data-delete-db="${String(row.name || "")}" style="min-width:90px;">Delete</button>`
                        : `<span>-</span>`;
                    tr.innerHTML = `
                        <td>${String(row.name || "")}</td>
                        <td>${String(row.company_name || "")}</td>
                        <td>${formatDate(row.created_at)}</td>
                        <td class="actions">
                            ${deleteAction}
                        </td>
                    `;
                    createdDbTableBodyEl.appendChild(tr);
                });
            }catch(err){
                createdDbTableBodyEl.innerHTML = `<tr><td colspan="4">${String(err.message || "Failed to load databases")}</td></tr>`;
            }
        }

        async function deleteDatabase(databaseName){
            if(!canDeleteDb){
                alert("You do not have delete permission for DB Create page.");
                return;
            }
            const name = String(databaseName || "").trim().toLowerCase();
            if(!name) return;
            const ok = window.confirm(`Delete database '${name}'?`);
            if(!ok) return;
            try{
                await request(`/users/databases/${encodeURIComponent(name)}`, "DELETE");
                showMessageBox("Database deleted");
                await loadCreatedDatabases();
            }catch(err){
                alert(err.message || "Failed to delete database");
            }
        }

        databaseNameEl.addEventListener("input", () => {
            const cleaned = sanitizeDbName(databaseNameEl.value);
            if(databaseNameEl.value !== cleaned){
                databaseNameEl.value = cleaned;
            }
        });
        createdDbTableBodyEl.addEventListener("click", async (ev) => {
            const btn = ev.target.closest("button[data-delete-db]");
            if(!btn) return;
            await deleteDatabase(btn.getAttribute("data-delete-db"));
        });

        window.saveDatabase = saveDatabase;

        async function applyPermissionState(){
            if(typeof window.__waitForUserAccessPermissions === "function"){
                await window.__waitForUserAccessPermissions();
            }
            canAddDb = !!window.hasUserActionPermission && window.hasUserActionPermission(DB_CREATE_PATH, "add");
            canDeleteDb = !!window.hasUserActionPermission && window.hasUserActionPermission(DB_CREATE_PATH, "delete");
            if(saveDbBtnEl){
                saveDbBtnEl.style.display = canAddDb ? "" : "none";
            }
        }

        (async function init(){
            const role = (localStorage.getItem("role") || "").toLowerCase();
            if(role !== "admin"){
                alert("Only admin can access this page.");
                window.location.href = "../dashboard.html";
                return;
            }
            await applyPermissionState();
            await loadCreatedDatabases();
        })();
    </script>
</body>
</html>
