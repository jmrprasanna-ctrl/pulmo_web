<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inv Map - PULMO TECHNOLOGIES</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="stylesheet" href="../../assets/css/dashboard.css">
    <link rel="stylesheet" href="../../assets/extracted/pages/users/inv-map.inline-style-1.css">
</head>
<body>
    <div class="sidebar">
        <div class="logo">
            <img src="../../assets/images/logo.png" alt="Company Logo">
            <span>PULMO TECHNOLOGIES</span>
        </div>
        <ul class="nav-links">
            <li><a href="../dashboard.html">Dashboard</a></li>
            <li><a href="../products/product-list.html">Products</a></li>
            <li><a href="../products/general-machine.html">Machines</a></li>
            <li><a href="../customers/customer-list.html">Customers</a></li>
            <li><a href="../invoices/invoice-list.html">Invoices</a></li>
            <li><a href="../vendors/list-vendor.html">Vendors</a></li>
            <li><a href="../expenses/expense-list.html">Expenses</a></li>
            <li><a href="../reports/sales-report.html">Reports</a></li>
            <li><a href="../analytics/sales-chart.html">Analytics</a></li>
        </ul>
    </div>

    <div class="main-content">
        <header class="page-head">
            <h2>Inv Map</h2>
            <a class="icon-btn" href="user-access.html" aria-label="Back to user access" title="Back to user access">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M14.5 6.5 9 12l5.5 5.5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </a>
        </header>

        <div class="form-container inv-map-wrap">
            <div class="inv-map-grid">
                <div>
                    <label for="userSelect">User</label>
                    <select id="userSelect"><option value="">Select user</option></select>
                </div>
                <div>
                    <label for="databaseSelect">Database</label>
                    <select id="databaseSelect"><option value="">Select database</option></select>
                </div>
            </div>

            <div class="inv-map-card">
                <label style="margin-bottom:8px;display:block;">Invoice Mapped Functions</label>
                <table class="inv-map-table">
                    <thead>
                        <tr>
                            <th>Function</th>
                            <th>Preference Source</th>
                            <th>Enable</th>
                        </tr>
                    </thead>
                    <tbody id="featureBody"></tbody>
                </table>
            </div>

            <div class="inv-map-card">
                <div class="inv-map-row"><strong>Verify Status</strong><span id="verifyStatus">Not verified</span></div>
                <div class="inv-map-row"><strong>Missing Preferences</strong><span id="missingStatus">-</span></div>
            </div>

            <div class="inv-map-card">
                <label style="margin-bottom:8px;display:block;">Mapped Entries</label>
                <table class="inv-map-table entries-table">
                    <thead>
                        <tr>
                            <th>User</th>
                            <th>Uploads</th>
                            <th>Database</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="entriesBody">
                        <tr><td colspan="5" style="text-align:center;color:#5d6f85;">No mapped entries</td></tr>
                    </tbody>
                </table>
            </div>

            <div class="access-actions" style="margin-top:16px; display:flex; gap:10px; flex-wrap:wrap;">
                <button id="verifyBtn" class="icon-btn" type="button" onclick="verifyInvMap()" aria-label="Verify inv map" title="Verify inv map">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M5 12.5 9.2 17 19 7.5" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
                <button id="mappedBtn" class="icon-btn" type="button" onclick="saveInvMap()" aria-label="Inv map" title="Inv map">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M5.5 3.5h11l2 2V20.5H5.5Z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
                        <path d="M8 3.5v5h7v-5" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
                        <path d="M8 14h8" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script src="../../assets/js/api.js"></script>
    <script src="../../assets/extracted/pages/users/inv-map.inline-script-1.js"></script>
</body>
</html>
