<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Logged - PULMO TECHNOLOGIES</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="stylesheet" href="../../assets/css/dashboard.css">
    <link rel="stylesheet" href="../../assets/extracted/pages/users/user-logged.inline-style-1.css">
</head>
<body>
    <div class="sidebar">
        <div class="logo">
            <img src="../../assets/images/logo.png" alt="Company Logo">
            <span>PULMO TECHNOLOGIES</span>
        </div>
        <ul class="nav-links">
            <li><a href="../dashboard.html">Dashboard</a></li>
            <li><a href="../products/product-list.html">Products</a></li>
            <li><a href="../products/general-machine.html">Machines</a></li>
            <li><a href="../customers/customer-list.html">Customers</a></li>
            <li><a href="../invoices/invoice-list.html">Invoices</a></li>
            <li><a href="../vendors/list-vendor.html">Vendors</a></li>
            <li><a href="../expenses/expense-list.html">Expenses</a></li>
            <li><a href="../reports/sales-report.html">Reports</a></li>
            <li><a href="../analytics/sales-chart.html">Analytics</a></li>
        </ul>
    </div>

    <div class="main-content">
        <header><h2>User Logged Times</h2></header>

        <div class="form-container log-shell">
            <div class="log-toolbar">
                <div class="log-filter">
                    <label for="periodSelect">Summary Period</label>
                    <select id="periodSelect">
                        <option value="week">Week</option>
                        <option value="month">Month</option>
                        <option value="year">Year</option>
                    </select>
                </div>
                <div class="log-filter">
                    <label for="dateInput">Date Reference</label>
                    <input id="dateInput" type="date">
                </div>
                <div class="log-filter">
                    <label for="userSelect">Select User</label>
                    <select id="userSelect">
                        <option value="">All Users</option>
                    </select>
                </div>
                <div class="log-actions">
                    <button class="btn btn-danger" type="button" onclick="clearLogs()">Clear</button>
                    <button class="btn btn-primary" type="button" onclick="loadLogs()">Search</button>
                    <button class="btn btn-primary" type="button" onclick="savePDF()">Save PDF</button>
                    <a class="btn btn-secondary" href="user-list.html">Back</a>
                </div>
            </div>

            <div class="log-table-wrap">
                <table id="loggedTable">
                    <thead>
                        <tr>
                            <th>User Name</th>
                            <th>Role</th>
                            <th>Login Time</th>
                            <th>IP</th>
                            <th>City</th>
                        </tr>
                    </thead>
                    <tbody id="loggedBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="../../assets/js/api.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="../../assets/extracted/pages/users/user-logged.inline-script-1.js"></script>
</body>
</html>
