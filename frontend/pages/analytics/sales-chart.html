<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Chart - PULMO TECHNOLOGIES</title>
<link rel="stylesheet" href="../../assets/css/style.css">
<link rel="stylesheet" href="../../assets/css/dashboard.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
    .page-head{
        display:flex;
        align-items:center;
        justify-content:space-between;
        gap:10px;
        flex-wrap:nowrap;
        width:100%;
    }
    .page-head h2{
        margin:0;
        flex:1 1 auto;
        min-width:0;
    }
    .page-head .icon-btn{
        margin-left:auto;
        flex:0 0 auto;
    }
</style>
</head>
<body>

<div class="sidebar">
    <div class="logo">
        <img src="../../assets/images/logo.png" alt="Logo">
        <span>PULMO TECHNOLOGIES</span>
    </div>
        <ul class="nav-links">
        <li><a href="../dashboard.html">Dashboard</a></li>
        <li><a href="../products/product-list.html">Products</a></li>
        <li><a href="../products/general-machine.html">Machines</a></li>
        <li><a href="../customers/customer-list.html">Customers</a></li>
        <li><a href="../invoices/invoice-list.html">Invoices</a></li>
        <li><a href="../vendors/list-vendor.html">Vendors</a></li>
        <li><a href="../expenses/expense-list.html">Expenses</a></li>
        <li><a href="../reports/sales-report.html">Reports</a></li>
        <li><a href="../analytics/sales-chart.html">Analytics</a></li>
    </ul>
</div>

<div class="main-content">
    <header class="page-head">
        <h2>Sales Chart</h2>
        <a class="icon-btn" href="../dashboard.html" aria-label="Back to dashboard" title="Back to dashboard">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M14.5 6.5 9 12l5.5 5.5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </a>
    </header>
    <div class="form-container">
        <div style="display:flex; gap:10px; align-items:end; flex-wrap:wrap; margin-bottom:14px;">
            <div>
                <label for="salesPeriod">Period</label>
                <select id="salesPeriod">
                    <option value="week">Week</option>
                    <option value="month" selected>Month</option>
                    <option value="year">Year</option>
                </select>
            </div>
            <div>
                <label for="salesDate">Reference Date</label>
                <input type="date" id="salesDate">
            </div>
            <div>
                <button class="icon-btn" id="salesSearchBtn" type="button" aria-label="Search" title="Search">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <circle cx="11" cy="11" r="5.5" fill="none" stroke="currentColor" stroke-width="1.8"/>
                        <path d="M15.2 15.2 19 19" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                    </svg>
                </button>
            </div>
        </div>
        <div id="salesChartMeta" style="margin-bottom:8px; color:#475569; font-size:13px;"></div>
        <canvas id="salesChart"></canvas>
    </div>
</div>

<script src="../../assets/js/api.js"></script>
<script src="../../assets/extracted/pages/analytics/sales-chart.inline-script-1.js"></script>
</body>
</html>
