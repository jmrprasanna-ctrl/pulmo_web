<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PULMO TECHNOLOGIES - Forgot Password</title>
<link rel="stylesheet" href="../assets/extracted/pages/login.inline-style-1.css?v=20260522p01">
<link rel="stylesheet" href="../assets/extracted/pages/forgot-password.inline-style-1.css?v=20260522p01">
</head>
<body>

<div class="login-container forgot-password-container">
    <img src="../assets/images/logo.png" alt="Company Logo">
    <h2>Forgot Password</h2>
    <p class="login-meta">Enter your registered email address</p>
    <form id="forgotPasswordForm" method="post" autocomplete="off" novalidate>
        <div class="field">
            <label for="resetEmail">Email</label>
            <input
                type="email"
                id="resetEmail"
                name="email"
                placeholder="Enter your email"
                autocomplete="off"
                autocapitalize="none"
                autocorrect="off"
                spellcheck="false"
                required
            >
        </div>
        <button class="login-btn" id="resetBtn" type="submit">Reset Password</button>
    </form>
    <p id="forgotPasswordStatus" class="forgot-password-status" aria-live="polite"></p>
    <a href="login.html" class="forgot-password">Back to Login</a>
</div>

<script src="../assets/js/api.js?v=20260521p1"></script>
<script src="../assets/extracted/pages/forgot-password.inline-script-1.js?v=20260522p01"></script>

</body>
</html>
