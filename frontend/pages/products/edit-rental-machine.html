<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Rental Machine - PULMO TECHNOLOGIES</title>
<link rel="stylesheet" href="../../assets/css/style.css">
<link rel="stylesheet" href="../../assets/css/dashboard.css">
<link rel="stylesheet" href="../../assets/extracted/pages/products/edit-rental-machine.inline-style-1.css">
</head>
<body>

<div class="sidebar">
    <div class="logo">
        <img src="../../assets/images/logo.png" alt="Logo">
        <span>PULMO TECHNOLOGIES</span>
    </div>
    <ul class="nav-links">
        <li><a href="../dashboard.html">Dashboard</a></li>
        <li><a href="../products/product-list.html">Products</a></li>
        <li><a href="../products/general-machine.html">Machines</a></li>
        <li><a href="../customers/customer-list.html">Customers</a></li>
        <li><a href="../invoices/invoice-list.html">Invoices</a></li>
        <li><a href="../vendors/list-vendor.html">Vendors</a></li>
        <li><a href="../expenses/expense-list.html">Expenses</a></li>
        <li><a href="../reports/sales-report.html">Reports</a></li>
        <li><a href="../analytics/sales-chart.html">Analytics</a></li>
    </ul>
</div>

<div class="main-content">
    <header class="page-head">
        <h2>Edit Rental Machine</h2>
        <a class="icon-btn" href="machine.html" aria-label="Back to rental machines" title="Back to rental machines">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M14.5 6.5 9 12l5.5 5.5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </a>
    </header>

    <div class="form-container">
        <form id="rentalMachineForm">
            <label>Machine ID</label>
            <input type="text" id="machineId" placeholder="PTR0001" required>

            <label>Customer Name</label>
            <select id="customerId" required>
                <option value="">Select Rental Customer</option>
            </select>

            <label>Address</label>
            <input type="text" id="address" placeholder="Address" required>

            <label>Model</label>
            <input type="text" id="model" placeholder="MODEL" required>

            <label>Machine Title</label>
            <input type="text" id="machineTitle" placeholder="MACHINE TITLE" required>

            <label>Serial No</label>
            <input type="text" id="serialNo" placeholder="SERIAL NO">

            <label>Start Count</label>
            <input type="number" id="startCount" placeholder="0" min="0" step="1" required>

            <label>Page per price (Rs.)</label>
            <input type="number" id="pagePerPrice" placeholder="0.00" min="0" step="0.01" value="0">

            <label>Updated Count</label>
            <input type="number" id="updatedCount" placeholder="0" min="0" step="1" value="0">

            <div class="button-row">
                <button type="submit" class="icon-btn" aria-label="Update rental machine" title="Update rental machine">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M5.5 3.5h11l2 2V20.5H5.5Z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
                        <path d="M8 3.5v5h7v-5" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
                        <path d="M8 14h8" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
                    </svg>
                </button>
                <button type="button" class="icon-btn btn-danger" id="deleteRentalMachineBtn" aria-label="Delete rental machine" title="Delete rental machine">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M5 7h14" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
                        <path d="M9.5 7V5.5h5V7" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/>
                        <path d="M7.5 7.5l.8 11a1 1 0 0 0 1 .9h5.4a1 1 0 0 0 1-.9l.8-11" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/>
                        <path d="M10 10.5v6M14 10.5v6" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
                    </svg>
                </button>
            </div>
        </form>
    </div>
</div>

<script src="../../assets/js/api.js"></script>
<script src="../../assets/extracted/pages/products/edit-rental-machine.inline-script-1.js"></script>
</body>
</html>
