<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Rental Count - PULMO TECHNOLOGIES</title>
<link rel="stylesheet" href="../../assets/css/style.css">
<link rel="stylesheet" href="../../assets/css/dashboard.css">
<link rel="stylesheet" href="../../assets/extracted/pages/products/add-rental-count.inline-style-1.css">
</head>
<body>

<div class="sidebar">
    <div class="logo">
        <img src="../../assets/images/logo.png" alt="Logo">
        <span>PULMO TECHNOLOGIES</span>
    </div>
    <ul class="nav-links">
        <li><a href="../dashboard.html">Dashboard</a></li>
        <li><a href="../products/product-list.html">Products</a></li>
        <li><a href="../products/general-machine.html">Machines</a></li>
        <li><a href="../customers/customer-list.html">Customers</a></li>
        <li><a href="../invoices/invoice-list.html">Invoices</a></li>
        <li><a href="../vendors/list-vendor.html">Vendors</a></li>
        <li><a href="../expenses/expense-list.html">Expenses</a></li>
        <li><a href="../reports/sales-report.html">Reports</a></li>
        <li><a href="../analytics/sales-chart.html">Analytics</a></li>
    </ul>
</div>

<div class="main-content">
    <header><h2>Rental Count</h2></header>

    <div class="form-container">
        <form id="rentalCountForm">
            <label>Entry Date</label>
            <input type="date" id="entryDate" required>

            <label>Transaction ID</label>
            <input type="text" id="transactionId" placeholder="RMC-0001" required>

            <label>Rental Machine</label>
            <select id="rentalMachineId" required>
                <option value="">Select Rental Machine</option>
            </select>

            <label>Customer</label>
            <input type="text" id="customerName" placeholder="Customer Name" readonly>

            <label>Input Count (Last Updated Count)</label>
            <input type="number" id="inputCount" min="0" step="1" readonly>

            <label>Updated Count</label>
            <input type="number" id="updatedCount" min="0" step="1" required>

            <div class="button-row">
                <button type="submit">Save Rental Count</button>
                <button class="btn btn-secondary" type="button" onclick="window.location.href='machine.html'">Back</button>
            </div>
        </form>
    </div>

    <div class="form-container">
        <header class="table-header-row">
            <h3>Rental Machines Counts</h3>
            <select id="machineTitleFilter" class="table-filter">
                <option value="">All Machine Titles</option>
            </select>
        </header>
        <table id="rentalCountTable">
            <thead>
                <tr>
                    <th>Transaction ID</th>
                    <th>Machine ID</th>
                    <th>Machine Title</th>
                    <th>Customer</th>
                    <th>Input Count</th>
                    <th>Updated Count</th>
                    <th>Price (Rs.)</th>
                    <th>Date</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script src="../../assets/js/api.js"></script>
<script src="../../assets/extracted/pages/products/add-rental-count.inline-script-1.js"></script>
</body>
</html>
