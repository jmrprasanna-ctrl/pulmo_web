<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add General Machine - PULMO TECHNOLOGIES</title>
<link rel="stylesheet" href="../../assets/css/style.css">
<link rel="stylesheet" href="../../assets/css/dashboard.css">
<link rel="stylesheet" href="../../assets/css/add-product.css">
</head>
<body>

<div class="sidebar">
    <div class="logo">
        <img src="../../assets/images/logo.png" alt="Logo">
        <span>PULMO TECHNOLOGIES</span>
    </div>
    <ul class="nav-links">
        <li><a href="../dashboard.html">Dashboard</a></li>
        <li><a href="../products/product-list.html">Products</a></li>
        <li><a href="../products/general-machine.html">Machines</a></li>
        <li><a href="../customers/customer-list.html">Customers</a></li>
        <li><a href="../invoices/invoice-list.html">Invoices</a></li>
        <li><a href="../vendors/list-vendor.html">Vendors</a></li>
        <li><a href="../expenses/expense-list.html">Expenses</a></li>
        <li><a href="../reports/sales-report.html">Reports</a></li>
        <li><a href="../analytics/sales-chart.html">Analytics</a></li>
    </ul>
</div>

<div class="main-content add-product-main">
    <div class="add-product-shell">
        <div class="add-product-header">
            <div>
                <h2 class="add-product-title">Add General Machine</h2>
            </div>
            <div class="add-product-badge">Machine Setup</div>
        </div>

        <form id="generalMachineForm">
            <div class="add-product-grid">
                <div class="field">
                    <label for="machineId">Machine ID</label>
                    <input class="readonly-input" type="text" id="machineId" placeholder="GTR0001" readonly required>
                    <span class="field-hint">Auto generated from last general machine id.</span>
                </div>

                <div class="field">
                    <label for="customerId">Customer Name</label>
                    <select id="customerId" required>
                        <option value="">Select General Customer</option>
                    </select>
                </div>

                <div class="field">
                    <label for="address">Address</label>
                    <input type="text" id="address" placeholder="Address" required>
                </div>

                <div class="field">
                    <label for="model">Model</label>
                    <select id="model" required>
                        <option value="">Select Photocopier Model</option>
                    </select>
                </div>

                <div class="field">
                    <label for="machineTitle">Machine Title</label>
                    <input type="text" id="machineTitle" placeholder="MACHINE TITLE" required>
                </div>

                <div class="field">
                    <label for="serialNo">Serial No</label>
                    <input type="text" id="serialNo" placeholder="SERIAL NO">
                </div>

                <div class="field">
                    <label for="entryDate">Entry Date</label>
                    <input type="date" id="entryDate" required>
                </div>

                <div class="field">
                    <label for="startCount">Start Count</label>
                    <input type="number" id="startCount" placeholder="0" min="0" step="1" required>
                </div>
            </div>

            <div class="add-product-actions">
                <button type="submit">Save General Machine</button>
                <button class="btn btn-secondary" type="button" onclick="window.location.href='general-machine.html'">Back</button>
            </div>
        </form>
    </div>
</div>

<script src="../../assets/js/api.js"></script>
<script src="../../assets/extracted/pages/products/add-general-machine.inline-script-1.js"></script>
</body>
</html>
