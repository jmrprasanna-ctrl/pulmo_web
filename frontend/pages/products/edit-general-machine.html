<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit General Machine - PULMO TECHNOLOGIES</title>
<link rel="stylesheet" href="../../assets/css/style.css">
<link rel="stylesheet" href="../../assets/css/dashboard.css">
<link rel="stylesheet" href="../../assets/css/general-machine.css">
<style>
    .page-head{
        display:flex;
        align-items:center;
        justify-content:space-between;
        gap:10px;
        flex-wrap:nowrap;
        width:100%;
    }
    .page-head h2{
        margin:0;
        flex:1 1 auto;
        min-width:0;
    }
    .page-head .icon-btn{
        margin-left:auto;
        flex:0 0 auto;
    }
    .button-row .icon-btn{
        width:44px;
        min-width:44px;
        height:44px;
        min-height:44px;
        padding:0;
        flex:0 0 auto;
    }
    .button-row .icon-btn.btn-danger{
        background:#fff2f4;
        color:#b4232f;
        border:1px solid #f0c2ca;
    }
    .button-row .icon-btn.btn-danger:hover{
        background:#ffe8ec;
        border-color:#e8aab5;
    }
    @media (min-width: 1101px){
        .form-container form{
            max-width: 980px;
        }
    }
</style>
</head>
<body>

<div class="sidebar">
    <div class="logo">
        <img src="../../assets/images/logo.png" alt="Logo">
        <span>PULMO TECHNOLOGIES</span>
    </div>
    <ul class="nav-links">
        <li><a href="../dashboard.html">Dashboard</a></li>
        <li><a href="../products/product-list.html">Products</a></li>
        <li><a href="../products/general-machine.html">Machines</a></li>
        <li><a href="../customers/customer-list.html">Customers</a></li>
        <li><a href="../invoices/invoice-list.html">Invoices</a></li>
        <li><a href="../vendors/list-vendor.html">Vendors</a></li>
        <li><a href="../expenses/expense-list.html">Expenses</a></li>
        <li><a href="../reports/sales-report.html">Reports</a></li>
        <li><a href="../analytics/sales-chart.html">Analytics</a></li>
    </ul>
</div>

<div class="main-content">
    <header class="page-head">
        <h2>Edit General Machine</h2>
        <a class="icon-btn" href="general-machine.html" aria-label="Back to general machines" title="Back to general machines">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M14.5 6.5 9 12l5.5 5.5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </a>
    </header>

    <div class="form-container">
        <form id="generalMachineForm">
            <label>Machine ID</label>
            <input type="text" id="machineId" placeholder="GTR0001" required>

            <label>Customer Name</label>
            <select id="customerId" required>
                <option value="">Select General Customer</option>
            </select>

            <label>Address</label>
            <input type="text" id="address" placeholder="Address" required>

            <label>Model</label>
            <input type="text" id="model" placeholder="MODEL" required>

            <label>Machine Title</label>
            <input type="text" id="machineTitle" placeholder="MACHINE TITLE" required>

            <label>Serial No</label>
            <input type="text" id="serialNo" placeholder="SERIAL NO">

            <label>Entry Date</label>
            <input type="date" id="entryDate" required>

            <label>Start Count</label>
            <input type="number" id="startCount" placeholder="0" min="0" step="1" required>

            <div class="button-row">
                <button type="submit" class="icon-btn" aria-label="Update general machine" title="Update general machine">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M5.5 3.5h11l2 2V20.5H5.5Z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
                        <path d="M8 3.5v5h7v-5" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
                        <path d="M8 14h8" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
                    </svg>
                </button>
                <button type="button" class="icon-btn btn-danger" id="deleteGeneralMachineBtn" aria-label="Delete general machine" title="Delete general machine">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M5 7h14" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
                        <path d="M9.5 7V5.5h5V7" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/>
                        <path d="M7.5 7.5l.8 11a1 1 0 0 0 1 .9h5.4a1 1 0 0 0 1-.9l.8-11" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/>
                        <path d="M10 10.5v6M14 10.5v6" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
                    </svg>
                </button>
            </div>
        </form>
    </div>
</div>

<script src="../../assets/js/api.js"></script>
<script src="../../assets/extracted/pages/products/edit-general-machine.inline-script-1.js"></script>
</body>
</html>
