<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit General Machine - PULMO TECHNOLOGIES</title>
<link rel="stylesheet" href="../../assets/css/style.css">
<link rel="stylesheet" href="../../assets/css/dashboard.css">
<link rel="stylesheet" href="../../assets/css/general-machine.css">
<style>
    .page-head{
        display:flex;
        align-items:center;
        justify-content:space-between;
        gap:10px;
        flex-wrap:nowrap;
        width:100%;
    }
    .page-head h2{
        margin:0;
        flex:1 1 auto;
        min-width:0;
    }
    .page-head .icon-btn{
        margin-left:auto;
        flex:0 0 auto;
    }
</style>
</head>
<body>

<div class="sidebar">
    <div class="logo">
        <img src="../../assets/images/logo.png" alt="Logo">
        <span>PULMO TECHNOLOGIES</span>
    </div>
    <ul class="nav-links">
        <li><a href="../dashboard.html">Dashboard</a></li>
        <li><a href="../products/product-list.html">Products</a></li>
        <li><a href="../products/general-machine.html">Machines</a></li>
        <li><a href="../customers/customer-list.html">Customers</a></li>
        <li><a href="../invoices/invoice-list.html">Invoices</a></li>
        <li><a href="../vendors/list-vendor.html">Vendors</a></li>
        <li><a href="../expenses/expense-list.html">Expenses</a></li>
        <li><a href="../reports/sales-report.html">Reports</a></li>
        <li><a href="../analytics/sales-chart.html">Analytics</a></li>
    </ul>
</div>

<div class="main-content">
    <header class="page-head">
        <h2>Edit General Machine</h2>
        <a class="icon-btn" href="general-machine.html" aria-label="Back to general machines" title="Back to general machines">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M14.5 6.5 9 12l5.5 5.5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </a>
    </header>

    <div class="form-container">
        <form id="generalMachineForm">
            <label>Machine ID</label>
            <input type="text" id="machineId" placeholder="GTR0001" required>

            <label>Customer Name</label>
            <select id="customerId" required>
                <option value="">Select General Customer</option>
            </select>

            <label>Address</label>
            <input type="text" id="address" placeholder="Address" required>

            <label>Model</label>
            <input type="text" id="model" placeholder="MODEL" required>

            <label>Machine Title</label>
            <input type="text" id="machineTitle" placeholder="MACHINE TITLE" required>

            <label>Serial No</label>
            <input type="text" id="serialNo" placeholder="SERIAL NO">

            <label>Entry Date</label>
            <input type="date" id="entryDate" required>

            <label>Start Count</label>
            <input type="number" id="startCount" placeholder="0" min="0" step="1" required>

            <div class="button-row">
                <button type="submit">Update General Machine</button>
            </div>
        </form>
    </div>
</div>

<script src="../../assets/js/api.js"></script>
<script src="../../assets/extracted/pages/products/edit-general-machine.inline-script-1.js"></script>
</body>
</html>
