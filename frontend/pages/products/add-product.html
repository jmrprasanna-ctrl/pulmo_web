<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Product - PULMO TECHNOLOGIES</title>
<link rel="stylesheet" href="../../assets/css/style.css">
<link rel="stylesheet" href="../../assets/css/dashboard.css">
<link rel="stylesheet" href="../../assets/css/add-product.css">
</head>
<body>

<div class="sidebar">
    <div class="logo">
        <img src="../../assets/images/logo.png" alt="Logo">
        <span>PULMO TECHNOLOGIES</span>
    </div>
    <ul class="nav-links">
        <li><a href="../dashboard.html">Dashboard</a></li>
        <li><a href="../products/product-list.html">Products</a></li>
        <li><a href="../products/general-machine.html">Machines</a></li>
        <li><a href="../customers/customer-list.html">Customers</a></li>
        <li><a href="../invoices/invoice-list.html">Invoices</a></li>
        <li><a href="../vendors/list-vendor.html">Vendors</a></li>
        <li><a href="../expenses/expense-list.html">Expenses</a></li>
        <li><a href="../reports/sales-report.html">Reports</a></li>
        <li><a href="../analytics/sales-chart.html">Analytics</a></li>
    </ul>
</div>

<div class="main-content add-product-main">
    <div class="add-product-shell">
        <div class="add-product-header">
            <div>
                <h2 class="add-product-title">Add Product</h2>
            </div>
            <div class="add-product-badge">Inventory Setup</div>
        </div>

        <form id="productForm">
            <div class="add-product-grid">
                <div class="field">
                    <label for="category">Category</label>
                    <select id="category" required onchange="generateProductID()">
                        <option value="">Select Category</option>
                    </select>
                </div>

                <div class="field">
                    <label for="productId">Product ID</label>
                    <input class="readonly-input" type="text" id="productId" readonly>
                    <span class="field-hint">Auto generated by category prefix.</span>
                </div>

                <div class="field">
                    <label for="description">Description</label>
                    <input type="text" id="description" placeholder="Product Description" required>
                </div>

                <div class="field">
                    <label for="model">Model</label>
                    <select id="model" required>
                        <option value="">Select Model</option>
                    </select>
                </div>

                <div class="field">
                    <label for="serialNo">Serial No</label>
                    <input type="text" id="serialNo" placeholder="Serial Number">
                </div>

                <div class="field">
                    <label for="count">Count</label>
                    <input type="number" id="count" placeholder="Count" min="0" value="0">
                </div>

                <div class="field">
                    <label for="sellingPrice">Selling Price</label>
                    <input type="number" id="sellingPrice" placeholder="Selling Price" min="0" step="0.01" required>
                </div>

                <div class="field">
                    <label for="dealerPrice">Dealer Price</label>
                    <input type="number" id="dealerPrice" placeholder="Dealer Price" min="0" step="0.01" required>
                </div>

                <div class="field">
                    <label for="vendor">Vendor</label>
                    <select id="vendor" required>
                        <option value="">Select Vendor</option>
                    </select>
                </div>

                <div class="field">
                    <label for="stockSource">Stock</label>
                    <select id="stockSource">
                        <option value="Vender" selected>Vender</option>
                        <option value="PULMO">PULMO</option>
                        <option value="OTHER">OTHER</option>
                    </select>
                </div>
            </div>

            <div class="add-product-actions">
                <button type="submit">Save Product</button>
                <button class="btn btn-secondary" type="button" onclick="window.location.href='product-list.html'">Back</button>
            </div>
        </form>
    </div>
</div>

<script src="../../assets/js/api.js"></script>
<script src="../../assets/extracted/pages/products/add-product.inline-script-1.js"></script>

</body>
</html>
