<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Product - PULMO TECHNOLOGIES</title>
<link rel="stylesheet" href="../../assets/css/style.css">
<link rel="stylesheet" href="../../assets/css/dashboard.css">
<link rel="stylesheet" href="../../assets/css/add-product.css">
</head>
<body>

<div class="sidebar">
    <div class="logo">
        <img src="../../assets/images/logo.png" alt="Logo">
        <span>PULMO TECHNOLOGIES</span>
    </div>
    <ul class="nav-links">
        <li><a href="../dashboard.html">Dashboard</a></li>
        <li><a href="../products/product-list.html">Products</a></li>
        <li><a href="../products/general-machine.html">Machines</a></li>
        <li><a href="../customers/customer-list.html">Customers</a></li>
        <li><a href="../invoices/invoice-list.html">Invoices</a></li>
        <li><a href="../vendors/list-vendor.html">Vendors</a></li>
        <li><a href="../expenses/expense-list.html">Expenses</a></li>
        <li><a href="../reports/sales-report.html">Reports</a></li>
        <li><a href="../analytics/sales-chart.html">Analytics</a></li>
    </ul>
</div>

<div class="main-content add-product-main">
    <div class="add-product-shell">
        <div class="add-product-header">
            <div>
                <h2 class="add-product-title">Add Product</h2>
            </div>
            <div class="add-product-badge">Inventory Setup</div>
        </div>

        <form id="productForm">
            <div class="add-product-grid">
                <div class="field">
                    <label for="category">Category</label>
                    <select id="category" required onchange="generateProductID()">
                        <option value="">Select Category</option>
                    </select>
                </div>

                <div class="field">
                    <label for="productId">Product ID</label>
                    <input class="readonly-input" type="text" id="productId" readonly>
                    <span class="field-hint">Auto generated by category prefix.</span>
                </div>

                <div class="field">
                    <label for="description">Description</label>
                    <input type="text" id="description" placeholder="Product Description" required>
                </div>

                <div class="field">
                    <label for="model">Model</label>
                    <select id="model" required>
                        <option value="">Select Model</option>
                    </select>
                </div>

                <div class="field">
                    <label for="serialNo">Serial No</label>
                    <input type="text" id="serialNo" placeholder="Serial Number">
                </div>

                <div class="field">
                    <label for="count">Count</label>
                    <input type="number" id="count" placeholder="Count" min="0" value="0">
                </div>

                <div class="field">
                    <label for="sellingPrice">Selling Price</label>
                    <input type="number" id="sellingPrice" placeholder="Selling Price" min="0" step="0.01" required>
                </div>

                <div class="field">
                    <label for="dealerPrice">Dealer Price</label>
                    <input type="number" id="dealerPrice" placeholder="Dealer Price" min="0" step="0.01" required>
                </div>

                <div class="field">
                    <label for="vendor">Vendor</label>
                    <select id="vendor" required>
                        <option value="">Select Vendor</option>
                    </select>
                </div>

                <div class="field">
                    <label for="stockSource">Stock</label>
                    <select id="stockSource">
                        <option value="Vender" selected>Vender</option>
                        <option value="PULMO">PULMO</option>
                        <option value="OTHER">OTHER</option>
                    </select>
                </div>
            </div>

            <div class="add-product-actions">
                <button type="submit">Save Product</button>
                <button class="btn btn-secondary" type="button" onclick="window.location.href='product-list.html'">Back</button>
            </div>
        </form>
    </div>
</div>

<script src="../../assets/js/api.js"></script>
<script>
if(!localStorage.getItem("token")){
    window.location.href = "../login.html";
}

const defaultCategories = [
    "Photocopier",
    "Printer",
    "Plotter",
    "Computer",
    "Laptop",
    "Accessory",
    "Consumable",
    "Machine",
    "CCTV",
    "Duplo",
    "Other",
    "Service"
];

const categoryPrefix = {
    "Photocopier":"PH",
    "Printer":"PR",
    "Plotter":"PL",
    "Computer":"CO",
    "Laptop":"LP",
    "Accessory":"AC",
    "Consumable":"CM",
    "Machine":"MA",
    "CCTV":"CT",
    "Duplo":"DP",
    "Other":"OT",
    "Service":"SV"
};

let allVendors = [];

const defaultModelOptions = {
    "Accessory": ["CANON", "TOSHIBA", "RECOH", "SHARP", "KYOCERA", "SEROX", "SAMSUNG", "HP", "DELL"],
    "Consumable": ["CANON", "TOSHIBA", "RECOH", "SHARP", "KYOCERA", "SEROX", "SAMSUNG", "HP", "DELL"],
    "Machine": ["CANON", "TOSHIBA", "RECOH", "SHARP", "KYOCERA", "SEROX", "SAMSUNG", "HP", "DELL"],
    "Photocopier": ["CANON", "TOSHIBA", "RECOH", "SHARP", "KYOCERA", "SEROX", "SAMSUNG", "HP", "DELL"],
    "Printer": ["CANON", "HP", "EPSON", "BROTHER", "LEXMARK", "OTHER", "SEROX", "SAMSUNG"],
    "Computer": ["HP", "DELL", "ASUS", "SONY", "SINGER", "SAMSUNG", "SPARE PARTS", "OTHER"],
    "Laptop": ["HP", "DELL", "ASUS", "SONY", "SINGER", "SAMSUNG", "SPARE PARTS", "OTHER"],
    "Plotter": ["CANON", "HP", "EPSON", "OTHER"],
    "CCTV": ["HICKVISION", "DAHUA", "OTHER"],
    "Duplo": ["CANON", "TOSHIBA", "RECOH"],
    "Other": ["OTHER"],
    "Service": ["OTHER"]
};

function normalizeCategories(text){
    if(!text) return [];
    return String(text)
        .split(",")
        .map(c => c.trim().toLowerCase())
        .filter(Boolean);
}

function renderVendorsByCategory(){
    const vendorSelect = document.getElementById("vendor");
    const categorySelect = document.getElementById("category");
    const selectedCategory = String(categorySelect.selectedOptions[0]?.dataset?.name || "")
        .trim()
        .toLowerCase();
    vendorSelect.innerHTML = `<option value="">Select Vendor</option>`;

    const filtered = selectedCategory
        ? allVendors.filter(v => normalizeCategories(v.category).includes(selectedCategory))
        : allVendors;

    filtered.forEach((v) => {
        const opt = document.createElement("option");
        opt.value = v.id;
        opt.innerText = v.name;
        vendorSelect.appendChild(opt);
    });
}

function renderModelsByCategory(){
    const modelSelect = document.getElementById("model");
    const categorySelect = document.getElementById("category");
    const selectedCategory = categorySelect.selectedOptions[0]?.dataset?.name || "";
    modelSelect.innerHTML = `<option value="">Select Model</option>`;

    if(!selectedCategory) return;

    const list = defaultModelOptions[selectedCategory] || [];
    list.forEach((model) => {
        const opt = document.createElement("option");
        opt.value = model;
        opt.innerText = model;
        modelSelect.appendChild(opt);
    });
}

async function fetchVendors(){
    try{
        allVendors = await request("/vendors","GET");
        renderVendorsByCategory();
    }catch(_err){
        alert("Failed to load vendors");
    }
}

function renderCategories(list){
    const categorySelect = document.getElementById("category");
    categorySelect.innerHTML = `<option value="">Select Category</option>`;
    list.forEach((item) => {
        const name = String(item.name || item || "").trim();
        const opt = document.createElement("option");
        opt.value = item.id ? String(item.id) : item;
        opt.dataset.name = name;
        opt.innerText = name;
        categorySelect.appendChild(opt);
    });
}

async function fetchCategories(){
    try{
        const categories = await request("/categories","GET");
        renderCategories(categories);
    }catch(_err){
        renderCategories(defaultCategories);
    }
}

async function generateProductID(){
    const categorySelect = document.getElementById("category");
    const categoryName = categorySelect.selectedOptions[0]?.dataset?.name || "";
    renderVendorsByCategory();
    renderModelsByCategory();
    if(!categoryName){
        document.getElementById("productId").value = "";
        return;
    }

    const prefix = categoryPrefix[categoryName] || categoryName.slice(0,2).toUpperCase();
    const cacheKey = `lastProductId:${categoryName}`;
    try{
        const lastProduct = await request(`/products/last/${encodeURIComponent(categoryName)}`,"GET");
        if(lastProduct && lastProduct.product_id){
            localStorage.setItem(cacheKey, lastProduct.product_id);
        }
        const lastIdNum = (lastProduct && lastProduct.product_id)
            ? parseInt(lastProduct.product_id.slice(2), 10)
            : 0;
        const newId = prefix + String((Number.isFinite(lastIdNum) ? lastIdNum : 0) + 1).padStart(4, "0");
        document.getElementById("productId").value = newId;
    }catch(_err){
        const cached = localStorage.getItem(cacheKey);
        const lastIdNum = cached ? parseInt(cached.slice(2), 10) : 0;
        const newId = prefix + String((Number.isFinite(lastIdNum) ? lastIdNum : 0) + 1).padStart(4, "0");
        document.getElementById("productId").value = newId;
    }
}

["description","serialNo"].forEach((id) => {
    const el = document.getElementById(id);
    if(!el) return;
    el.style.textTransform = "uppercase";
    el.addEventListener("input", () => {
        const pos = el.selectionStart;
        el.value = el.value.toUpperCase();
        el.setSelectionRange(pos, pos);
    });
});

document.getElementById("productForm").addEventListener("submit", async function(e){
    e.preventDefault();
    const categorySelect = document.getElementById("category");
    const categoryName = categorySelect.selectedOptions[0]?.dataset?.name || "";

    const data = {
        category: categoryName || categorySelect.value,
        product_id: document.getElementById("productId").value.trim(),
        description: document.getElementById("description").value.trim(),
        model: document.getElementById("model").value.trim(),
        serial_no: document.getElementById("serialNo").value.trim(),
        count: Number(document.getElementById("count").value || 0),
        selling_price: Number(document.getElementById("sellingPrice").value || 0),
        dealer_price: Number(document.getElementById("dealerPrice").value || 0),
        vendor_id: Number(document.getElementById("vendor").value || 0)
    };

    if(!data.category || !data.product_id || !data.description || !data.model || !data.vendor_id){
        alert("Please fill required fields.");
        return;
    }

    try{
        await request("/products","POST",data);
        showMessageBox("Product saved successfully");
        document.getElementById("productForm").reset();
        document.getElementById("productId").value = "";
        renderModelsByCategory();
        renderVendorsByCategory();
    }catch(err){
        alert(err.message || "Failed to save product");
    }
});

Promise.allSettled([fetchCategories(), fetchVendors()]);

function logout(){
    localStorage.removeItem("token");
    localStorage.removeItem("role");
    window.location.href="../login.html";
}
</script>

</body>
</html>
