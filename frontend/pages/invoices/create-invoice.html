<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Invoice - PULMO TECHNOLOGIES</title>
<script src="../../assets/extracted/pages/invoices/create-invoice.inline-script-1.js"></script>
<link rel="stylesheet" href="../../assets/css/style.css">
<link rel="stylesheet" href="../../assets/css/dashboard.css">
<link rel="stylesheet" href="../../assets/css/add-product.css">
<link rel="stylesheet" href="../../assets/extracted/pages/invoices/create-invoice.inline-style-1.css">
</head>
<body>

                
<div class="sidebar">
    <div class="logo">
        <img src="../../assets/images/logo.png" alt="Logo">
        <span>PULMO TECHNOLOGIES</span>
    </div>
        <ul class="nav-links">
        <li><a href="../dashboard.html">Dashboard</a></li>
        <li><a href="../products/product-list.html">Products</a></li>
        <li><a href="../products/general-machine.html">Machines</a></li>
        <li><a href="../customers/customer-list.html">Customers</a></li>
        <li><a href="../invoices/invoice-list.html">Invoices</a></li>
        <li><a href="../vendors/list-vendor.html">Vendors</a></li>
        <li><a href="../expenses/expense-list.html">Expenses</a></li>
        <li><a href="../reports/sales-report.html">Reports</a></li>
        <li><a href="../analytics/sales-chart.html">Analytics</a></li>
    </ul>
</div>

                     
<div class="main-content add-product-main">
    <div class="add-product-shell invoice-shell">
        <div class="add-product-header">
            <div>
                <h2 class="add-product-title">Create Invoice</h2>
            </div>
            <div class="add-product-badge">Billing</div>
        </div>

        <form id="invoiceForm">
            <div class="add-product-grid invoice-grid">
                <div class="field">
                    <label for="customer">Customer</label>
                    <select id="customer" required>
                        <option value="">Select Customer</option>
                    </select>
                </div>

                <div class="field">
                    <label for="machine">Machine</label>
                    <select id="machine">
                        <option value="">Select Customer First</option>
                    </select>
                </div>

                <div class="field">
                    <label for="machineSerialNo">Serial No</label>
                    <input class="readonly-input" type="text" id="machineSerialNo" readonly>
                </div>

                <div class="field">
                    <label for="address">Address</label>
                    <input class="readonly-input" type="text" id="address" readonly>
                </div>

                <div class="field">
                    <label for="email">Email</label>
                    <input class="readonly-input" type="email" id="email" readonly>
                </div>

                <div class="field">
                    <label for="tel">Tel</label>
                    <input class="readonly-input" type="text" id="tel" readonly>
                </div>

                <div class="field">
                    <label for="count">Count</label>
                    <input type="number" id="count" min="0" step="1" placeholder="Enter count">
                </div>

                <div class="field">
                    <label for="supportTechnician">Support Technician</label>
                    <select id="supportTechnician">
                        <option value="">Select Technician (Optional)</option>
                    </select>
                </div>

                <div class="field">
                    <label for="supportTechnicianPercentage">Support Technician Percentage (%)</label>
                    <input type="number" id="supportTechnicianPercentage" min="0" step="0.01" placeholder="Enter percentage" disabled>
                </div>

                <div class="field">
                    <label for="paymentMethod">Payment Method</label>
                    <select id="paymentMethod">
                        <option value="Cash" selected>Cash</option>
                        <option value="Cheque">Cheque</option>
                        <option value="Credit">Credit</option>
                    </select>
                </div>

                <div id="vatNoWrap" class="field is-hidden">
                    <label for="vatNo">VAT No</label>
                    <input class="readonly-input" type="text" id="vatNo" readonly>
                </div>
                <div id="vatValueWrap" class="field is-hidden">
                    <label for="vatValue">VAT Value (%)</label>
                    <input type="number" id="vatValue" min="0" step="0.01" value="0" placeholder="Enter VAT %">
                </div>

                <div class="field">
                    <label for="invoiceNo">Invoice No</label>
                    <input class="readonly-input" type="text" id="invoiceNo" readonly>
                </div>

                <div class="field">
                    <label for="invoiceDate">Invoice Date</label>
                    <input type="date" id="invoiceDate" required>
                </div>
                <div class="field">
                    <label for="quotationDate">Quotation Date</label>
                    <input type="date" id="quotationDate" required>
                </div>

                <div class="card product-card field-span-full">
                    <div class="product-toolbar">
                        <button class="btn btn-inline-add" id="addProductRowBtn" type="button">Add Product</button>
                        <span class="product-hint">Search by Product ID or Description</span>
                    </div>
                        <div class="table-scroll">
                            <table class="table product-table">
                                <thead>
                                    <tr>
                                        <th class="w-300">Product</th>
                                        <th class="w-240">Description</th>
                                        <th class="w-90">Qty</th>
                                        <th class="w-110">Rate</th>
                                        <th class="w-90">VAT %</th>
                                        <th class="w-130">Gross</th>
                                        <th class="w-120">Action</th>
                                    </tr>
                                </thead>
                                <tbody id="productRows"></tbody>
                            </table>
                        </div>
                        <div class="product-total-row">
                            <span class="product-total-label">TOTAL =</span>
                            <span id="productsTableTotal" class="product-total-value">0.00</span>
                        </div>
                    </div>

                <div class="field-span-full">
                    <div class="important-actions">
                        <button class="btn btn-inline" id="addImportantBtn" type="button">Important</button>
                        <select id="supportImportantSelect" class="support-important-select">
                            <option value="">Select Support Important</option>
                        </select>
                        <button class="btn btn-inline" id="addImportantFromSupportBtn" type="button">Add important</button>
                    </div>
                    <div class="card card-mt-12">
                        <div class="table-scroll">
                            <table class="table">
                                <thead>
                                    <tr>
                                        <th class="w-80">Line</th>
                                        <th>Important Note</th>
                                        <th class="w-140">Action</th>
                                    </tr>
                                </thead>
                                <tbody id="important-table-body"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
            <div class="add-product-actions">
                <button type="submit">Save</button>
                <button class="btn btn-secondary" id="backToInvoiceListBtn" type="button">Back</button>
            </div>
        </form>
    </div>
</div>

<script src="../../assets/js/api.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="../../assets/extracted/pages/invoices/create-invoice.inline-script-2.js"></script>

</body>
</html>
