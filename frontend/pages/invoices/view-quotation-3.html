<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quatation Details 3 - PULMO TECHNOLOGIES</title>
<link rel="stylesheet" href="../../assets/css/style.css">
<link rel="stylesheet" href="../../assets/css/dashboard.css">
<link rel="stylesheet" href="../../assets/css/invoice-view.css">
</head>
<body>
<div class="main-content invoice-main">
    <h1 class="invoice-title">Quatation Details 3</h1>
    <div class="invoice-address-controls">
        <label style="display:flex;align-items:center;gap:8px;font-weight:600;">
            <input type="checkbox" id="sign1Chk">
            SIGN Q3
        </label>
        <label style="display:flex;align-items:center;gap:8px;font-weight:600;">
            <input type="checkbox" id="seal1Chk">
            SEAL Q3
        </label>
        <label style="display:flex;align-items:center;gap:8px;font-weight:600;">
            <input type="checkbox" id="editModeChk">
            Edit
        </label>
        <div class="invoice-date-inline">
            <label for="qut3DateInput" style="margin:0;font-weight:600;color:#1d3655;white-space:nowrap;">Qut 3 Date</label>
            <input type="date" id="qut3DateInput">
            <button class="btn btn-secondary" type="button" id="saveQut3DateBtn">Update</button>
        </div>
        <div class="invoice-date-inline">
            <label for="qut3CustomerNameInput" style="margin:0;font-weight:600;color:#1d3655;white-space:nowrap;">Customer</label>
            <input type="text" id="qut3CustomerNameInput" placeholder="Customer Name">
            <button class="btn btn-secondary" type="button" id="saveQut3CustomerNameBtn">Update</button>
        </div>
    </div>
    <div class="invoice-layout-controls" style="margin: 0 0 12px; padding: 10px 12px; background: rgba(255, 255, 255, 0.86); border: 1px solid #d6e3f2; border-radius: 14px; display: flex; gap: 8px; align-items: center; flex-wrap: nowrap; overflow-x: auto;">
        <label for="renderInputToggle" style="margin:0;font-weight:600;color:#1d3655;">Render Input</label>
        <div id="renderInputDropdown" style="position:relative;min-width:220px;">
            <button type="button" class="btn btn-secondary" id="renderInputToggle" style="margin-top:0;width:100%;text-align:left;">Render Inputs</button>
            <div id="renderInputChecklist" style="display:none;position:fixed;z-index:9999;min-width:300px;max-width:360px;max-height:260px;overflow:auto;background:#fff;border:1px solid #d6e3f2;border-radius:10px;padding:8px;box-shadow:0 10px 25px rgba(0,0,0,.12);"></div>
        </div>
        <label for="layoutTargetSelect" style="margin:0;font-weight:600;color:#1d3655;">Edit Input</label>
        <select id="layoutTargetSelect" style="min-width:180px;">
            <option value="customerName">Customer Name</option>
            <option value="customerAddress">Address</option>
            <option value="customerTel">Tel</option>
            <option value="count">Count</option>
            <option value="serialNo">Serial No</option>
            <option value="date">Date</option>
            <option value="invoiceNo">Invoice No</option>
            <option value="machineTitle">Machine Title</option>
            <option value="supportTechnician">Support Technician</option>
            <option value="paymentMethod">Payment Method</option>
            <option value="amountWords">Amount in Word</option>
            <option value="totalAmount">Total Amount</option>
            <option value="important">Important</option>
            <option value="itemNo">ITEM</option>
            <option value="description">DESCRIPTION</option>
            <option value="qty">QTY</option>
            <option value="rate">RATE</option>
            <option value="vat">VAT</option>
            <option value="grossAmount">GROSS AMOUNT</option>
            <option value="signC">SIGN Q3</option>
            <option value="sealC">SEAL Q3</option>
        </select>
        <div id="itemEditControls" style="display:none;align-items:center;gap:8px;">
            <label id="itemEditRowLabel" for="layoutItemRowSelect" style="margin:0;font-weight:600;color:#1d3655;white-space:nowrap;">Item</label>
            <select id="layoutItemRowSelect" style="min-width:120px;"></select>
            <label id="itemEditValueLabel" for="layoutItemNameInput" style="margin:0;font-weight:600;color:#1d3655;white-space:nowrap;">Item Name</label>
            <input type="text" id="layoutItemNameInput" placeholder="Custom item name" style="min-width:220px;">
            <button class="btn btn-secondary" type="button" id="saveItemNameOverrideBtn">Apply</button>
            <button class="btn btn-secondary" type="button" id="clearItemNameOverrideBtn">Clear</button>
        </div>
        <label for="layoutFontSelect" style="margin:0;font-weight:600;color:#1d3655;white-space:nowrap;">Font size</label>
        <select id="layoutFontSelect" style="min-width:90px;">
            <option value="10">10</option>
            <option value="12">12</option>
            <option value="14">14</option>
            <option value="16">16</option>
            <option value="18">18</option>
            <option value="20">20</option>
            <option value="22">22</option>
            <option value="24">24</option>
            <option value="25" selected>25</option>
            <option value="26">26</option>
            <option value="28">28</option>
            <option value="30">30</option>
            <option value="32">32</option>
            <option value="34">34</option>
            <option value="36">36</option>
            <option value="38">38</option>
            <option value="40">40</option>
        </select>
        <label for="layoutFontFamilySelect" style="margin:0;font-weight:600;color:#1d3655;white-space:nowrap;">Font list</label>
        <select id="layoutFontFamilySelect" style="min-width:160px;">
            <option value="Cambria">Cambria</option>
            <option value="Berlin Sans FB">Berlin Sans FB</option>
            <option value="Bahnschrift">Bahnschrift</option>
            <option value="Bookman Old Style">Bookman Old Style</option>
            <option value="Californian FB">Californian FB</option>
            <option value="Century Gothic">Century Gothic</option>
            <option value="Consolas">Consolas</option>
            <option value="Cascadia Code Light">Cascadia Code Light</option>
            <option value="Courier New">Courier New</option>
            <option value="Franklin Gothic Book">Franklin Gothic Book</option>
            <option value="Elephant">Elephant</option>
            <option value="Segoe UI">Segoe UI</option>
            <option value="Lucida Sans">Lucida Sans</option>
        </select>
        <label for="layoutWeightSelect" style="margin:0;font-weight:600;color:#1d3655;white-space:nowrap;">Weight</label>
        <select id="layoutWeightSelect" style="min-width:92px;">
            <option value="bold">Bold</option>
            <option value="normal" selected>Unbold</option>
        </select>
        <label for="layoutPreviewSelect" style="margin:0;font-weight:600;color:#1d3655;white-space:nowrap;">Preview</label>
        <select id="layoutPreviewSelect" style="min-width:110px;">
            <option value="true" selected>Preview</option>
            <option value="false">Not Preview</option>
        </select>
        <button class="btn btn-secondary" type="button" id="moveLeftBtn">&lt;</button>
        <button class="btn btn-secondary" type="button" id="moveRightBtn">&gt;</button>
        <button class="btn btn-secondary" type="button" id="moveUpBtn">^</button>
        <button class="btn btn-secondary" type="button" id="moveDownBtn">v</button>
    </div>
    <div class="invoice-image-wrap">
        <img id="invoicePreview" class="invoice-image" alt="Invoice preview">
    </div>
    <div class="invoice-actions">
        <button class="btn btn-primary" onclick="printPDF()">Print PDF</button>
        <button class="btn btn-secondary" type="button" onclick="window.location.href='invoice-list.html'">Back</button>
    </div>
</div>

<script src="../../assets/js/api.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="../../assets/extracted/pages/invoices/view-quotation-3.inline-script-1.js"></script>
</body>
</html>
