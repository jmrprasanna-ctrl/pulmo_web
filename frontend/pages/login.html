<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PULMO TECHNOLOGIES - Login</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:
        radial-gradient(circle at 10% 10%, rgba(255,255,255,0.12) 0, transparent 35%),
        radial-gradient(circle at 90% 95%, rgba(255,255,255,0.08) 0, transparent 30%),
        linear-gradient(135deg, #547fa8 0%, #244b6f 100%);
    padding: 20px;
    padding-bottom: 64px;
}

.login-container{
    width:100%;
    max-width:460px;
    background:rgba(255,255,255,0.98);
    border-radius:22px;
    border:1px solid rgba(255,255,255,0.8);
    box-shadow:0 24px 44px rgba(0, 30, 58, 0.35);
    padding:34px 34px 30px;
    text-align:center;
    position:relative;
}

.login-container img{
    width:128px;
    height:128px;
    object-fit:contain;
    margin:8px auto 10px;
}

.login-container h2{
    font-size:16px;
    font-weight:700;
    color:#2b2b2b;
    margin-bottom:6px;
}

.login-meta{
    font-size:16px;
    color:#5d7082;
    margin-bottom:22px;
}

.field{
    margin-bottom:16px;
    text-align:left;
}

.field label{
    display:block;
    font-size:16px;
    color:#425568;
    margin-bottom:7px;
    font-weight:600;
}

.login-container input{
    width:100%;
    height:52px;
    border:1px solid #d0d0d0;
    border-radius:12px;
    background:#fdfdfd;
    padding:0 16px;
    font-size:16px;
    color:#222;
}

.password-wrap{
    position:relative;
}

.password-wrap input{
    padding-right:52px;
}

.password-toggle{
    position:absolute;
    right:10px;
    top:50%;
    transform:translateY(-50%);
    width:34px;
    height:34px;
    border:none;
    border-radius:8px;
    background:transparent;
    color:#7f8c98;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
}

.password-toggle:hover{
    background:#eef3f8;
    color:#4f7ea9;
}

.password-toggle:focus{
    outline:none;
    box-shadow:0 0 0 3px rgba(79,126,169,0.2);
}

.login-container input:focus{
    outline:none;
    border-color:#4f7ea9;
    box-shadow:0 0 0 3px rgba(79,126,169,0.2);
}

.login-btn{
    width:100%;
    height:52px;
    border:none;
    border-radius:12px;
    margin-top:8px;
    background:linear-gradient(180deg, #5d8bb6 0%, #4f7da8 100%);
    color:#fff;
    font-size:16px;
    font-weight:600;
    letter-spacing:.2px;
    cursor:pointer;
    transition:background .2s ease, transform .2s ease;
}

.login-btn:hover{
    background:#3f6f9e;
    transform:translateY(-1px);
}

.forgot-password{
    display:inline-block;
    margin-top:16px;
    color:#4f708b;
    text-decoration:none;
    font-size:16px;
}

.forgot-password:hover{
    text-decoration:underline;
}

.app-global-footer{
    position:fixed;
    left:0;
    bottom:0;
    width:100%;
    text-align:center;
    padding:10px 14px;
    border-top:1px solid rgba(255,255,255,0.28);
    background:rgba(255,255,255,0.72);
    color:#1d3855;
    font-size:15px;
    z-index:99;
    backdrop-filter:blur(5px);
}

@media (max-width:640px){
    .login-container{
        max-width:95vw;
        padding:24px 20px 22px;
        border-radius:18px;
    }

    .login-container h2{
        font-size:16px;
        margin-bottom:6px;
    }

    .login-container img{
        width:96px;
        height:96px;
    }

    .login-container input,
    .login-btn{
        height:48px;
        font-size:16px;
        border-radius:10px;
    }

    .forgot-password{
        font-size:16px;
    }
}
</style>
</head>
<body>

<div class="login-container">
    <img src="../assets/images/logo.png" alt="Company Logo">
    <h2>User Login</h2>
    <p class="login-meta">PULMO TECHNOLOGIES</p>
    <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Email" required>
    </div>
    <div class="field">
        <label for="password">Password</label>
        <div class="password-wrap">
            <input type="password" id="password" placeholder="Password" required>
            <button
                type="button"
                class="password-toggle"
                id="passwordToggle"
                aria-label="Show password"
                aria-pressed="false"
                onclick="togglePassword()"
            >
                <svg id="eyeIcon" width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path d="M2 12C3.9 8 7.4 5.5 12 5.5C16.6 5.5 20.1 8 22 12C20.1 16 16.6 18.5 12 18.5C7.4 18.5 3.9 16 2 12Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
                    <circle cx="12" cy="12" r="3.2" stroke="currentColor" stroke-width="1.8"/>
                </svg>
            </button>
        </div>
    </div>
    <button class="login-btn" onclick="login()">Login</button>
    <a href="#" class="forgot-password" onclick="forgotPassword()">Forgot password?</a>
</div>

<script src="../assets/js/api.js"></script>
<script>
async function login(){
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    if(!email || !password){ alert("Please fill all fields"); return; }

    try{
        const res = await request("/auth/login","POST",{email,password});
        localStorage.setItem("token",res.token);
        localStorage.setItem("role",res.user.role);
        if (res.user && res.user.database_name) {
            localStorage.setItem("selectedDatabaseName", String(res.user.database_name).trim().toLowerCase());
        } else {
            localStorage.removeItem("selectedDatabaseName");
        }
        localStorage.setItem("userId", res.user.id);
        localStorage.setItem("userEmail", res.user.email || email);
        if (res.user.name) {
            localStorage.setItem("userName", res.user.name);
        }
        window.location.href = "dashboard.html";
    }catch(err){
        alert(err.message || "Login failed");
    }
}

async function forgotPassword(){
    const email = prompt("Enter your email to reset password");
    if(!email) return;
    try{
        await request("/auth/forgot-password","POST",{email});
        alert("Password reset email sent. Check your inbox.");
    }catch(err){
        alert(err.message || "Failed to send email");
    }
}

function togglePassword(){
    const input = document.getElementById("password");
    const toggleBtn = document.getElementById("passwordToggle");
    const eyeIcon = document.getElementById("eyeIcon");
    const isHidden = input.type === "password";
    input.type = isHidden ? "text" : "password";
    toggleBtn.setAttribute("aria-label", isHidden ? "Hide password" : "Show password");
    toggleBtn.setAttribute("aria-pressed", isHidden ? "true" : "false");
    eyeIcon.innerHTML = isHidden
        ? '<path d="M3 3L21 21" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M2 12C3.9 8 7.4 5.5 12 5.5C13.8 5.5 15.4 5.9 16.8 6.7M20.2 9.4C20.9 10.2 21.5 11 22 12C20.1 16 16.6 18.5 12 18.5C8.2 18.5 5.2 16.8 3.2 14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><circle cx="12" cy="12" r="3.2" stroke="currentColor" stroke-width="1.8"/>'
        : '<path d="M2 12C3.9 8 7.4 5.5 12 5.5C16.6 5.5 20.1 8 22 12C20.1 16 16.6 18.5 12 18.5C7.4 18.5 3.9 16 2 12Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><circle cx="12" cy="12" r="3.2" stroke="currentColor" stroke-width="1.8"/>';
}
</script>

</body>
</html>
