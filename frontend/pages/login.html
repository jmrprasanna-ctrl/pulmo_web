<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PULMO TECHNOLOGIES - Login</title>
<link rel="stylesheet" href="../assets/extracted/pages/login.inline-style-1.css">
</head>
<body>

<div class="login-container">
    <img src="../assets/images/logo.png" alt="Company Logo">
    <h2>User Login</h2>
    <p class="login-meta">PULMO TECHNOLOGIES</p>
    <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Email" required>
    </div>
    <div class="field">
        <label for="password">Password</label>
        <div class="password-wrap">
            <input type="password" id="password" placeholder="Password" required>
            <button
                type="button"
                class="password-toggle"
                id="passwordToggle"
                aria-label="Show password"
                aria-pressed="false"
                onclick="togglePassword()"
            >
                <svg id="eyeIcon" width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path d="M2 12C3.9 8 7.4 5.5 12 5.5C16.6 5.5 20.1 8 22 12C20.1 16 16.6 18.5 12 18.5C7.4 18.5 3.9 16 2 12Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
                    <circle cx="12" cy="12" r="3.2" stroke="currentColor" stroke-width="1.8"/>
                </svg>
            </button>
        </div>
    </div>
    <button class="login-btn" onclick="login()">Login</button>
    <a href="#" class="forgot-password" onclick="forgotPassword()">Forgot password?</a>
</div>

<script src="../assets/js/api.js"></script>
<script src="../assets/extracted/pages/login.inline-script-1.js"></script>

</body>
</html>
