<link rel="stylesheet" href="../../assets/css/dashboard.css">
<link rel="stylesheet" href="../../assets/extracted/pages/expenses/expense-list.inline-style-1.css">
</head>
<body>

                
<div class="sidebar">
    <div class="logo">
        <img src="../../assets/images/logo.png" alt="Logo">
        <span>PULMO TECHNOLOGIES</span>
    </div>
        <ul class="nav-links">
        <li><a href="../dashboard.html">Dashboard</a></li>
        <li><a href="../products/product-list.html">Products</a></li>
        <li><a href="../products/general-machine.html">Machines</a></li>
        <li><a href="../customers/customer-list.html">Customers</a></li>

        <li><a href="../vendors/list-vendor.html">Vendors</a></li>
        <li><a href="../expenses/expense-list.html">Expenses</a></li>
        <li><a href="../reports/sales-report.html">Reports</a></li>
        <li><a href="../analytics/sales-chart.html">Analytics</a></li>
    </ul>
</div>

<div class="main-content">
    <header class="page-head">
        <h2>Expenses List</h2>
        <a class="icon-btn" href="../dashboard.html" aria-label="Back to dashboard" title="Back to dashboard">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M14.5 6.5 9 12l5.5 5.5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </a>
    </header>

    <div class="form-container">
        <div class="form-actions">
            <div class="action-row">
                <a class="icon-btn" href="add-expense.html" id="addExpenseBtn" aria-label="Add expense" title="Add expense">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M12 5v14M5 12h14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                    </svg>
                </a>
                <button class="icon-btn" type="button" onclick="exportPDF()" aria-label="Export as PDF" title="Export as PDF">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M7 3.5h7l4 4V19a1.5 1.5 0 0 1-1.5 1.5h-9A1.5 1.5 0 0 1 6 19V5A1.5 1.5 0 0 1 7.5 3.5Z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
                        <path d="M14 3.5V8h4" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
                        <path d="M12 10.5v6M9.5 14l2.5 2.5L14.5 14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>
            <div class="date-filter">
                <label for="filterDate">Date</label>
                <input type="date" id="filterDate">
            </div>
            <div class="date-filter">
                <label for="filterPeriod">Period</label>
                <select id="filterPeriod">
                    <option value="date">Date</option>
                    <option value="week">Week</option>
                    <option value="month" selected>Month</option>
                    <option value="year">Annual</option>
                </select>
            </div>
            <input type="text" id="expenseSearch" class="search-inline" placeholder="Search Title, Customer, Category">
        </div>
        <div class="summary-row">
            <div class="summary-box">
                <div class="label">Filtered Total Expenses</div>
                <div class="value" id="filteredTotal">0.00</div>
            </div>
            <div class="summary-box">
                <div class="label">Filtered Entries</div>
                <div class="value" id="filteredCount">0</div>
            </div>
            <div class="summary-box">
                <div class="label">Filter Info</div>
                <div class="value" id="filterInfo">Month</div>
            </div>
        </div>
        <div class="card" style="margin-top:12px;">
            <table id="expenseTable">
                <thead>
                    <tr>
                        <th>Title</th>
                        <th>Customer</th>
                        <th>Amount</th>
                        <th>Date</th>
                        <th>Category</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<script src="../../assets/js/api.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</body>
</html>
