<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="../../assets/css/style.css">
<link rel="stylesheet" href="../../assets/css/dashboard.css">
<link rel="stylesheet" href="../../assets/extracted/pages/vendors/edit-vendor.inline-style-1.css">
</head>
<body>

                
<div class="sidebar">
    <div class="logo">
        <img src="../../assets/images/logo.png" alt="Logo">
        <span>PULMO TECHNOLOGIES</span>
    </div>
        <ul class="nav-links">
        <li><a href="../dashboard.html">Dashboard</a></li>
        <li><a href="../products/product-list.html">Products</a></li>
        <li><a href="../products/general-machine.html">Machines</a></li>
        <li><a href="../customers/customer-list.html">Customers</a></li>

        <li><a href="../vendors/list-vendor.html">Vendors</a></li>
        <li><a href="../expenses/expense-list.html">Expenses</a></li>
        <li><a href="../reports/sales-report.html">Reports</a></li>
        <li><a href="../analytics/sales-chart.html">Analytics</a></li>
    </ul>
</div>

                     
<div class="main-content">
    <header class="page-head">
        <h2>Edit Vendor</h2>
        <a class="icon-btn" href="list-vendor.html" aria-label="Back to vendors list" title="Back to vendors list">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M14.5 6.5 9 12l5.5 5.5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </a>
    </header>

    <div class="form-container">
        <form id="vendorForm">
            <label>Vendor Name</label>
            <input type="text" id="name" placeholder="Vendor Name" required>

            <label>Address</label>
            <input type="text" id="address" placeholder="Address" required>

            <label>Product Category</label>
            <div class="category-grid" id="category">
                <label class="check">
                    <input type="checkbox" name="vendorCategory" value="Photocopier">
                    <span>Photocopier</span>
                </label>
                <label class="check">
                    <input type="checkbox" name="vendorCategory" value="Printer">
                    <span>Printer</span>
                </label>
                <label class="check">
                    <input type="checkbox" name="vendorCategory" value="Plotter">
                    <span>Plotter</span>
                </label>
                <label class="check">
                    <input type="checkbox" name="vendorCategory" value="Computer">
                    <span>Computer</span>
                </label>
                <label class="check">
                    <input type="checkbox" name="vendorCategory" value="Laptop">
                    <span>Laptop</span>
                </label>
                <label class="check">
                    <input type="checkbox" name="vendorCategory" value="Accessory">
                    <span>Accessory</span>
                </label>
                <label class="check">
                    <input type="checkbox" name="vendorCategory" value="Consumable">
                    <span>Consumable</span>
                </label>
                <label class="check">
                    <input type="checkbox" name="vendorCategory" value="Machine">
                    <span>Machine</span>
                </label>
                <label class="check">
                    <input type="checkbox" name="vendorCategory" value="CCTV">
                    <span>CCTV</span>
                </label>
                <label class="check">
                    <input type="checkbox" name="vendorCategory" value="Duplo">
                    <span>Duplo</span>
                </label>
                <label class="check">
                    <input type="checkbox" name="vendorCategory" value="Service">
                    <span>Service</span>
                </label>
                <label class="check">
                    <input type="checkbox" name="vendorCategory" value="Other">
                    <span>Other</span>
                </label>
            </div>
            <p class="helper-text">Select one or more categories.</p>

            <div class="form-actions">
                <button type="submit" class="icon-btn" aria-label="Update vendor" title="Update vendor">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M5.5 3.5h11l2 2V20.5H5.5Z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
                        <path d="M8 3.5v5h7v-5" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
                        <path d="M8 14h8" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
                    </svg>
                </button>
                <button type="button" class="icon-btn btn-danger" id="deleteVendorBtn" aria-label="Delete vendor" title="Delete vendor">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M5 7h14" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
                        <path d="M9.5 7V5.5h5V7" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/>
                        <path d="M7.5 7.5l.8 11a1 1 0 0 0 1 .9h5.4a1 1 0 0 0 1-.9l.8-11" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/>
                        <path d="M10 10.5v6M14 10.5v6" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
                    </svg>
                </button>
            </div>
        </form>
    </div>
</div>

<script src="../../assets/js/api.js"></script>
<script src="../../assets/extracted/pages/vendors/edit-vendor.inline-script-1.js"></script>
</body>
</html>
