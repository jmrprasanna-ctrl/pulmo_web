<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Vendor - PULMO TECHNOLOGIES</title>
<link rel="stylesheet" href="../../assets/css/style.css">
<link rel="stylesheet" href="../../assets/css/dashboard.css">
<link rel="stylesheet" href="../../assets/extracted/pages/vendors/edit-vendor.inline-style-1.css">
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
    <div class="logo">
        <img src="../../assets/images/logo.png" alt="Logo">
        <span>PULMO TECHNOLOGIES</span>
    </div>
        <ul class="nav-links">
        <li><a href="../dashboard.html">Dashboard</a></li>
        <li><a href="../products/product-list.html">Products</a></li>
        <li><a href="../products/general-machine.html">Machines</a></li>
        <li><a href="../customers/customer-list.html">Customers</a></li>
        <li><a href="../invoices/invoice-list.html">Invoices</a></li>
        <li><a href="../vendors/list-vendor.html">Vendors</a></li>
        <li><a href="../expenses/expense-list.html">Expenses</a></li>
        <li><a href="../reports/sales-report.html">Reports</a></li>
        <li><a href="../analytics/sales-chart.html">Analytics</a></li>
    </ul>
</div>

<!-- Main Content -->
<div class="main-content">
    <header><h2>Edit Vendor</h2></header>

    <div class="form-container">
        <form id="vendorForm">
            <label>Vendor Name</label>
            <input type="text" id="name" placeholder="Vendor Name" required>

            <label>Address</label>
            <input type="text" id="address" placeholder="Address" required>

            <label>Product Category</label>
            <div class="category-grid" id="category">
                <label class="check">
                    <input type="checkbox" name="vendorCategory" value="Photocopier">
                    <span>Photocopier</span>
                </label>
                <label class="check">
                    <input type="checkbox" name="vendorCategory" value="Printer">
                    <span>Printer</span>
                </label>
                <label class="check">
                    <input type="checkbox" name="vendorCategory" value="Plotter">
                    <span>Plotter</span>
                </label>
                <label class="check">
                    <input type="checkbox" name="vendorCategory" value="Computer">
                    <span>Computer</span>
                </label>
                <label class="check">
                    <input type="checkbox" name="vendorCategory" value="Laptop">
                    <span>Laptop</span>
                </label>
                <label class="check">
                    <input type="checkbox" name="vendorCategory" value="Accessory">
                    <span>Accessory</span>
                </label>
                <label class="check">
                    <input type="checkbox" name="vendorCategory" value="Consumable">
                    <span>Consumable</span>
                </label>
                <label class="check">
                    <input type="checkbox" name="vendorCategory" value="Machine">
                    <span>Machine</span>
                </label>
                <label class="check">
                    <input type="checkbox" name="vendorCategory" value="CCTV">
                    <span>CCTV</span>
                </label>
                <label class="check">
                    <input type="checkbox" name="vendorCategory" value="Duplo">
                    <span>Duplo</span>
                </label>
                <label class="check">
                    <input type="checkbox" name="vendorCategory" value="Service">
                    <span>Service</span>
                </label>
                <label class="check">
                    <input type="checkbox" name="vendorCategory" value="Other">
                    <span>Other</span>
                </label>
            </div>
            <p class="helper-text">Select one or more categories.</p>

            <div class="form-actions">
                <button type="submit">Update Vendor</button>
                <a class="btn btn-secondary" href="list-vendor.html">Back</a>
            </div>
        </form>
    </div>
</div>

<script src="../../assets/js/api.js"></script>
<script src="../../assets/extracted/pages/vendors/edit-vendor.inline-script-1.js"></script>
</body>
</html>
