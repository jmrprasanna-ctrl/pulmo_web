</head>
<body>

                
<div class="sidebar">
    <div class="logo">
        <img src="../../assets/images/logo.png" alt="Logo">
        <span>PULMO TECHNOLOGIES</span>
    </div>
        <ul class="nav-links">

        <li><a href="../analytics/sales-chart.html">Analytics</a></li>
    </ul>
</div>

                     
<div class="main-content">
    <header class="page-head">
        <h2>Add Vendor</h2>
        <a class="icon-btn" href="list-vendor.html" aria-label="Back to vendors list" title="Back to vendors list">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M14.5 6.5 9 12l5.5 5.5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </a>
    </header>

    <div class="form-container add-product-shell">
        <form id="vendorForm">
            <div class="add-product-grid vendor-grid">
                <div class="field">
                    <label for="name">Vendor Name</label>
                    <input type="text" id="name" placeholder="Vendor Name" required>
                </div>

                <div class="field">
                    <label for="address">Address</label>
                    <input type="text" id="address" placeholder="Address" required>
                </div>

                <div class="field field-span-full">
                    <label for="category">Product Category</label>
                    <div class="category-grid" id="category">
                        <label class="check">
                            <input type="checkbox" name="vendorCategory" value="Photocopier">
                            <span>Photocopier</span>
                        </label>
                        <label class="check">
                            <input type="checkbox" name="vendorCategory" value="Printer">
                            <span>Printer</span>
                        </label>
                        <label class="check">
                            <input type="checkbox" name="vendorCategory" value="Plotter">
                            <span>Plotter</span>
                        </label>
                        <label class="check">
                            <input type="checkbox" name="vendorCategory" value="Computer">
                            <span>Computer</span>
                        </label>
                        <label class="check">
                            <input type="checkbox" name="vendorCategory" value="Laptop">
                            <span>Laptop</span>
                        </label>
                        <label class="check">
                            <input type="checkbox" name="vendorCategory" value="Accessory">
                            <span>Accessory</span>
                        </label>
                        <label class="check">
                            <input type="checkbox" name="vendorCategory" value="Consumable">
                            <span>Consumable</span>
                        </label>
                        <label class="check">
                            <input type="checkbox" name="vendorCategory" value="Machine">
                            <span>Machine</span>
                        </label>
                        <label class="check">
                            <input type="checkbox" name="vendorCategory" value="CCTV">
                            <span>CCTV</span>
                        </label>
                        <label class="check">
                            <input type="checkbox" name="vendorCategory" value="Duplo">
                            <span>Duplo</span>
                        </label>
                        <label class="check">
                            <input type="checkbox" name="vendorCategory" value="Service">
                            <span>Service</span>
                        </label>
                        <label class="check">
                            <input type="checkbox" name="vendorCategory" value="Other">
                            <span>Other</span>
                        </label>
                    </div>
                    <p class="helper-text">Select one or more categories.</p>
                </div>
            </div>

            <div class="add-product-actions">
                <button type="submit" class="icon-btn" aria-label="Save vendor" title="Save vendor">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M5.5 3.5h11l2 2V20.5H5.5Z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
                        <path d="M8 3.5v5h7v-5" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
                        <path d="M8 14h8" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
                    </svg>
                </button>
            </div>
        </form>
    </div>
</div>

<script src="../../assets/js/api.js"></script>
<script src="../../assets/extracted/pages/vendors/add-vendor.inline-script-1.js"></script>
</body>
</html>
